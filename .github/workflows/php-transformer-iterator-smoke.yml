name: PHP transformer iterator (smoke)

# Synthetic-packet smoke test for the php-transformer-iterator-agent.
# This workflow stages a committed finding-packet fixture, builds the iterator
# prompt locally, then delegates the agent run to the Homeboy Extensions
# reusable agent workflow.

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: Repository that owns the generated-site PR being smoke-tested.
        required: true
        default: chubes4/wp-site-generator
      source_pr:
        description: Generated-site PR number to report back to.
        required: true
      source_head_sha:
        description: Generated-site PR head SHA to attach to callback evidence.
        required: true
      openai_model:
        description: OpenAI model to use for the imported agent flow.
        required: true
        default: gpt-5.5

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  prepare:
    name: Build synthetic iterator prompt
    runs-on: ubuntu-latest
    outputs:
      prompt: ${{ steps.prompt.outputs.prompt }}
      should_run_iterator: ${{ steps.prompt.outputs.should_run_iterator }}
    steps:
      - name: Checkout site generator
        uses: actions/checkout@v4

      - name: Stage synthetic finding packets
        run: |
          set -euo pipefail
          mkdir -p .ci/finding-packets
          cp tests/fixtures/iterator-smoke/finding-packets.json .ci/finding-packets/finding-packets.json
          jq empty .ci/finding-packets/finding-packets.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Group finding packets
        env:
          FINDING_GROUPS_PATH: .ci/php-transformer-iterator-input.json
        run: |
          set -euo pipefail
          mapfile -t packets < <(find .ci/finding-packets -name finding-packets.json -type f | sort)
          if [ "${#packets[@]}" -eq 0 ]; then
            echo "No synthetic finding-packets.json files staged for iterator smoke run." >&2
            exit 1
          fi
          node .github/scripts/group-ssi-finding-packets.mjs "${packets[@]}"
          jq '.group_count, .candidate_repos' "$FINDING_GROUPS_PATH"

      - name: Build iterator prompt
        id: prompt
        env:
          FINDING_GROUPS_PATH: .ci/php-transformer-iterator-input.json
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_PR: ${{ inputs.source_pr }}
          SOURCE_HEAD_SHA: ${{ inputs.source_head_sha }}
          VALIDATION_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          prompt=$(jq -n \
            --arg sourceRepo "$SOURCE_REPO" \
            --arg sourcePr "$SOURCE_PR" \
            --arg sourceHeadSha "$SOURCE_HEAD_SHA" \
            --arg validationRunId "$VALIDATION_RUN_ID" \
            --slurpfile findingGroups "$FINDING_GROUPS_PATH" \
            '{
              source_repo: $sourceRepo,
              source_pr: $sourcePr,
              source_head_sha: $sourceHeadSha,
              validation_run_id: $validationRunId,
              finding_groups: $findingGroups[0]
            }' | sed '1s/^/Run the PHP transformer iterator now.\n\n/')
          group_count=$(jq -r '.group_count' "$FINDING_GROUPS_PATH")
          {
            printf 'should_run_iterator=%s\n' "$([ "$group_count" -gt 0 ] && printf true || printf false)"
            printf 'prompt<<EOF\n'
            printf '%s\n' "$prompt"
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"

  iterator-smoke:
    name: Run PR-first transformer iterator (synthetic packets)
    needs: prepare
    uses: ./.github/workflows/wpsg-runtime-agent-ci.yml
    with:
      model: ${{ inputs.openai_model }}
      runtime_tool_profile: workspace-iteration
      runtime_workspace_command_ability: ${{ vars.HOMEBOY_AGENT_RUNTIME_WORKSPACE_COMMAND_ABILITY }}
      runtime_workspace_publish_ability: ${{ vars.HOMEBOY_AGENT_RUNTIME_WORKSPACE_PUBLISH_ABILITY }}
      runtime_execution: '{"kind":"bundle","ability":"agents/run-runtime-package","input":{"package":{"source":"bundles/php-transformer-iterator-agent","slug":"php-transformer-iterator-agent"},"workflow":{"id":"php-transformer-iterator-manual-flow"},"input":{"target_repo":"${{ inputs.source_repo }}","prompt":${{ toJSON(needs.prepare.outputs.prompt) }},"run_agent":${{ fromJSON(needs.prepare.outputs.should_run_iterator) }},"app_token_repos":"chubes4/wp-site-generator,chubes4/static-site-importer,Automattic/blocks-engine","success_requires_pr":false,"success_completion_outcomes":["pull_request_path","issue_path"],"max_turns":24,"step_budget":20,"time_budget_ms":600000,"runtime_output_projections":{"upstream_action_url":"outputs.upstream_action_url","source_callback_url":"outputs.source_callback_url"},"evidence_projections":[{"operation":"create_github_issue","outputs":{"upstream_action_url":"data.issue_url"}},{"operation":"create_github_pull_request","outputs":{"upstream_action_url":"data.html_url"}},{"operation":"comment_github_pull_request","outputs":{"source_callback_url":"data.html_url"}}],"transcript_artifact_name":"php-transformer-iterator-transcript-${{ github.run_id }}"},"options":{"pipeline_slug":"php-transformer-iterator-pipeline"}}}'
      transcript_slots: '[{"name":"php-transformer-iterator-transcript","artifact_name":"php-transformer-iterator-transcript-${{ github.run_id }}"}]'
      task_timeout_seconds: 900
    secrets: inherit

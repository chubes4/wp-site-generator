name: PHP transformer iterator (smoke)

# Synthetic-packet smoke test for the php-transformer-iterator-agent.
# This workflow stages a committed finding-packet fixture, builds the iterator
# prompt locally, then delegates the agent run to the Homeboy Extensions
# reusable Data Machine agent workflow.

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: Repository that owns the generated-site PR being smoke-tested.
        required: true
        default: chubes4/wp-site-generator
      source_pr:
        description: Generated-site PR number to report back to.
        required: true
      source_head_sha:
        description: Generated-site PR head SHA to attach to callback evidence.
        required: true
      openai_model:
        description: OpenAI model to use for the imported agent flow.
        required: true
        default: gpt-5.5
      data_machine_ref:
        description: Data Machine ref.
        required: true
        default: main
      data_machine_code_ref:
        description: Data Machine Code ref.
        required: true
        default: main
      homeboy_extensions_ref:
        description: Homeboy Extensions ref.
        required: true
        default: main

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  prepare:
    name: Build synthetic iterator prompt
    runs-on: ubuntu-latest
    outputs:
      prompt: ${{ steps.prompt.outputs.prompt }}
      should_run_iterator: ${{ steps.prompt.outputs.should_run_iterator }}
    steps:
      - name: Checkout site generator
        uses: actions/checkout@v4

      - name: Stage synthetic finding packets
        run: |
          set -euo pipefail
          mkdir -p .ci/finding-packets
          cp tests/fixtures/iterator-smoke/finding-packets.json .ci/finding-packets/finding-packets.json
          jq empty .ci/finding-packets/finding-packets.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Group finding packets
        env:
          FINDING_GROUPS_PATH: .ci/php-transformer-iterator-input.json
        run: |
          set -euo pipefail
          mapfile -t packets < <(find .ci/finding-packets -name finding-packets.json -type f | sort)
          if [ "${#packets[@]}" -eq 0 ]; then
            echo "No synthetic finding-packets.json files staged for iterator smoke run." >&2
            exit 1
          fi
          node .github/scripts/group-ssi-finding-packets.mjs "${packets[@]}"
          jq '.group_count, .candidate_repos' "$FINDING_GROUPS_PATH"

      - name: Build iterator prompt
        id: prompt
        env:
          FINDING_GROUPS_PATH: .ci/php-transformer-iterator-input.json
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_PR: ${{ inputs.source_pr }}
          SOURCE_HEAD_SHA: ${{ inputs.source_head_sha }}
          VALIDATION_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          prompt=$(jq -n \
            --arg sourceRepo "$SOURCE_REPO" \
            --arg sourcePr "$SOURCE_PR" \
            --arg sourceHeadSha "$SOURCE_HEAD_SHA" \
            --arg validationRunId "$VALIDATION_RUN_ID" \
            --slurpfile findingGroups "$FINDING_GROUPS_PATH" \
            '{
              source_repo: $sourceRepo,
              source_pr: $sourcePr,
              source_head_sha: $sourceHeadSha,
              validation_run_id: $validationRunId,
              finding_groups: $findingGroups[0]
            }' | sed '1s/^/Run the PHP transformer iterator now.\n\n/')
          group_count=$(jq -r '.group_count' "$FINDING_GROUPS_PATH")
          {
            printf 'should_run_iterator=%s\n' "$([ "$group_count" -gt 0 ] && printf true || printf false)"
            printf 'prompt<<EOF\n'
            printf '%s\n' "$prompt"
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"

  iterator-smoke:
    name: Run PR-first transformer iterator (synthetic packets)
    needs: prepare
    uses: Extra-Chill/homeboy-extensions/.github/workflows/datamachine-agent-ci.yml@main
    with:
      bundle_path: bundles/php-transformer-iterator-agent
      agent_slug: php-transformer-iterator-agent
      pipeline_slug: php-transformer-iterator-pipeline
      flow_slug: php-transformer-iterator-manual-flow
      target_repo: ${{ inputs.source_repo }}
      prompt: ${{ needs.prepare.outputs.prompt }}
      run_agent: ${{ needs.prepare.outputs.should_run_iterator == 'true' }}
      model: ${{ inputs.openai_model }}
      app_token_repos: chubes4/wp-site-generator,chubes4/static-site-importer,chubes4/html-to-blocks-converter,chubes4/block-format-bridge
      validation_dependencies: Automattic/agents-api@main,Extra-Chill/data-machine@${{ inputs.data_machine_ref }},Extra-Chill/data-machine-code@${{ inputs.data_machine_code_ref }},WordPress/ai-provider-for-openai@main
      extra_required_abilities: |
        [
          "datamachine/workspace-worktree-add"
        ]
      success_requires_pr: true
      max_turns: 24
      step_budget: 20
      time_budget_ms: 600000
      engine_data_outputs: '{"upstream_action_url":"metadata.engine_data.php_transformer_iterator.upstream_action_url","source_callback_url":"metadata.engine_data.php_transformer_iterator.source_callback_url"}'
      transcript_artifact_name: php-transformer-iterator-transcript-${{ github.run_id }}
    secrets:
      HOMEBOY_APP_ID: ${{ secrets.HOMEBOY_APP_ID }}
      HOMEBOY_APP_PRIVATE_KEY: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

name: Headless Production Validation

on:
  workflow_dispatch:
    inputs:
      revolutions:
        description: Maximum headless production-loop revolutions.
        required: true
        default: '3'
      dry_run:
        description: Materialize the runtime task without launching the provider.
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      runtime_id:
        description: Generic Homeboy runtime id.
        required: true
        default: wp-codebox
      runtime_provider:
        description: AI provider id consumed by the selected runtime.
        required: true
        default: codex
      model:
        description: Provider model metadata forwarded to the selected runtime.
        required: true
        default: gpt-5.5
      homeboy_extensions_ref:
        description: Homeboy Extensions ref containing the generic headless production-loop runner.
        required: true
        default: main
      provider_plugin_paths:
        description: Comma-separated provider plugin paths mounted by the selected runtime.
        required: false
        default: ''
      secret_env:
        description: Comma-separated provider secret env names forwarded to the selected runtime.
        required: true
        default: AI_PROVIDER_OPENAI_CODEX_ACCESS_TOKEN,AI_PROVIDER_OPENAI_CODEX_REFRESH_TOKEN,AI_PROVIDER_OPENAI_CODEX_EXPIRES_AT,AI_PROVIDER_OPENAI_CODEX_ACCOUNT_ID,AI_PROVIDER_OPENAI_CODEX_FEDRAMP

permissions:
  contents: read
  actions: read

jobs:
  headless-production-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      HOMEBOY_HEADLESS_LOOP_REVOLUTIONS: ${{ inputs.revolutions }}
      HOMEBOY_AGENT_RUNTIME: ${{ inputs.runtime_id }}
      HOMEBOY_AGENT_RUNTIME_PROVIDER: ${{ inputs.runtime_provider }}
      HOMEBOY_AGENT_RUNTIME_MODEL: ${{ inputs.model }}
      HOMEBOY_AGENT_RUNTIME_PROVIDER_PLUGIN_PATHS: ${{ inputs.provider_plugin_paths }}
      HOMEBOY_AGENT_RUNTIME_SECRET_ENV: ${{ inputs.secret_env }}
      HOMEBOY_AGENT_TASK_OUTCOME_FILE: .ci/headless-production-validation/outcome.json
      HOMEBOY_RUNTIME_AGENT_RESULTS_FILE: .ci/headless-production-validation/results.json
      HOMEBOY_RUNTIME_AGENT_EVENTS_FILE: .ci/headless-production-validation/events.json
      HOMEBOY_RUNTIME_AGENT_LOOP_RESULT_FILE: .ci/headless-production-validation/loop-result.json
    steps:
      - name: Check out WPSG
        uses: actions/checkout@v4

      - name: Check out Homeboy Extensions
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/homeboy-extensions
          ref: ${{ inputs.homeboy_extensions_ref }}
          path: .ci/homeboy-extensions

      - name: Install Homeboy Extensions runtime dependencies
        working-directory: .ci/homeboy-extensions/wordpress
        run: |
          npm ci
          composer install --no-interaction --prefer-dist

      - name: Run headless production loop
        env:
          AI_PROVIDER_OPENAI_CODEX_ACCESS_TOKEN: ${{ secrets.AI_PROVIDER_OPENAI_CODEX_ACCESS_TOKEN }}
          AI_PROVIDER_OPENAI_CODEX_REFRESH_TOKEN: ${{ secrets.AI_PROVIDER_OPENAI_CODEX_REFRESH_TOKEN }}
          AI_PROVIDER_OPENAI_CODEX_EXPIRES_AT: ${{ secrets.AI_PROVIDER_OPENAI_CODEX_EXPIRES_AT }}
          AI_PROVIDER_OPENAI_CODEX_ACCOUNT_ID: ${{ secrets.AI_PROVIDER_OPENAI_CODEX_ACCOUNT_ID }}
          AI_PROVIDER_OPENAI_CODEX_FEDRAMP: ${{ secrets.AI_PROVIDER_OPENAI_CODEX_FEDRAMP }}
        run: >-
          node .ci/homeboy-extensions/runtime-agent-ci/scripts/run-headless-loop.cjs
          --spec .github/homeboy/headless-production-loop.json
          --revolutions "${{ inputs.revolutions }}"
          ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Upload headless production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: headless-production-validation-${{ github.run_id }}
          path: .ci/headless-production-validation/**
          if-no-files-found: ignore

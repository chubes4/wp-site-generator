name: Store Idea Agent

on:
  workflow_dispatch:
    inputs:
      concept_prompt:
        description: Store-concept prompt for store-idea-agent.
        required: true
        default: 'Industry: open. Generate one distinct, buildable store concept for an underserved but visually interesting product category.'
      openai_model:
        description: OpenAI model to use for the imported agent flow.
        required: true
        default: gpt-5.5
      target_repo:
        description: Repository that receives the concept issue. Defaults to the current repository.
        required: false
        default: ''
      data_machine_ref:
        description: Data Machine ref.
        required: true
        default: main
      data_machine_code_ref:
        description: Data Machine Code ref.
        required: true
        default: main
      homeboy_extensions_ref:
        description: Homeboy Extensions ref.
        required: true
        default: main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  idea-agent:
    name: Run store-idea-agent in Playground
    uses: Extra-Chill/homeboy-extensions/.github/workflows/datamachine-agent-ci.yml@main
    with:
      bundle_path: bundles/store-idea-agent
      agent_slug: store-idea-agent
      pipeline_slug: store-idea-pipeline
      flow_slug: store-idea-manual-flow
      target_repo: ${{ inputs.target_repo || github.repository }}
      prompt: ${{ inputs.concept_prompt }}
      model: ${{ inputs.openai_model }}
      validation_dependencies: Automattic/agents-api@main,Extra-Chill/data-machine@${{ inputs.data_machine_ref }},Extra-Chill/data-machine-code@${{ inputs.data_machine_code_ref }},WordPress/ai-provider-for-openai@main
      success_requires_pr: false
      max_turns: 6
      step_budget: 8
      time_budget_ms: 180000
      engine_data_outputs: '{"issue_url":"metadata.engine_data.store_idea_agent.issue_url","issue_number":"metadata.engine_data.store_idea_agent.issue_number"}'
      transcript_artifact_name: store-idea-agent-transcript-${{ github.run_id }}
    secrets:
      HOMEBOY_APP_ID: ${{ secrets.HOMEBOY_APP_ID }}
      HOMEBOY_APP_PRIVATE_KEY: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

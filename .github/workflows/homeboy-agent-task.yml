name: Homeboy Agent Task

on:
  workflow_dispatch:
    inputs:
      task_kind:
        description: Agent task to run.
        type: choice
        required: true
        options:
          - store_idea
          - website_idea
          - design
          - generate_candidate
          - publish_pr
      issue_number:
        description: Legacy issue number input; artifact-driven tasks use packet inputs.
        required: false
        default: ''
      concept_packet:
        description: ConceptPacket artifact reference for design/generate_candidate tasks.
        required: false
        default: ''
      design_packet:
        description: DesignPacket artifact reference for generate_candidate tasks.
        required: false
        default: ''
      static_site_candidate:
        description: StaticSiteCandidate artifact reference for publish_pr tasks.
        required: false
        default: ''
      import_validation_result:
        description: ImportValidationResult artifact reference for publish_pr tasks.
        required: false
        default: ''
      concept_prompt:
        description: Prompt for store_idea/website_idea tasks.
        required: false
        default: ''
      website_flow_slug:
        description: Website idea flow slug for website_idea tasks.
        type: choice
        options:
          - website-idea-artifact-flow
        default: website-idea-artifact-flow
      openai_model:
        description: OpenAI model to use for imported agent flows.
        required: true
        default: gpt-5.5
      homeboy_ref:
        description: Homeboy ref with agent-task DAG support.
        required: true
        default: main
      homeboy_extensions_ref:
        description: Homeboy Extensions ref with generic runtime package agent-task support.
        required: true
        default: main
      runtime_provider_profile:
        description: Optional runtime provider profile id supplied by the runtime contract.
        required: false
        default: ''
      runtime_components:
        description: JSON array of component contracts supplied to the runtime.
        required: false
        default: ''
      runtime_provider_plugins:
        description: JSON array of provider plugin contracts supplied to the runtime.
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: homeboy-agent-task-${{ github.ref }}-${{ inputs.task_kind }}-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  run-homeboy-agent-task:
    name: Run ${{ inputs.task_kind }} through Homeboy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HOMEBOY_TASK_KIND: ${{ inputs.task_kind }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      CONCEPT_PACKET: ${{ inputs.concept_packet }}
      DESIGN_PACKET: ${{ inputs.design_packet }}
      STATIC_SITE_CANDIDATE: ${{ inputs.static_site_candidate }}
      IMPORT_VALIDATION_RESULT: ${{ inputs.import_validation_result }}
      CONCEPT_PROMPT: ${{ inputs.concept_prompt }}
      WEBSITE_FLOW_SLUG: ${{ inputs.website_flow_slug }}
      OPENAI_MODEL: ${{ inputs.openai_model }}
      HOMEBOY_AGENT_RUNTIME_PROVIDER_PROFILE: ${{ inputs.runtime_provider_profile }}
      HOMEBOY_AGENT_RUNTIME_COMPONENTS: ${{ inputs.runtime_components }}
      HOMEBOY_AGENT_RUNTIME_PROVIDER_PLUGINS: ${{ inputs.runtime_provider_plugins }}
      GITHUB_TOKEN: ${{ github.token }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      HOMEBOY_CONTROLLER_RUN_INPUTS_PATH: ${{ github.workspace }}/.ci/homeboy-agent-task.controller-run-inputs.json
      HOMEBOY_POLICY_RESULT_PATH: ${{ github.workspace }}/.ci/homeboy-agent-task.complexity-policy-result.json
      HOMEBOY_CONTROLLER_RUN_SPEC_PATH: ${{ github.workspace }}/.ci/homeboy-agent-task.controller-run-spec.json
      HOMEBOY_CONTROLLER_MATERIALIZATION_RESULT_PATH: ${{ github.workspace }}/.ci/homeboy-agent-task.controller-materialization.json
      HOMEBOY_CONTROLLER_FROM_SPEC_RESULT_PATH: ${{ github.workspace }}/.ci/homeboy-agent-task.controller-from-spec.json
      HOMEBOY_CONTROLLER_RESUME_RESULT_PATH: ${{ github.workspace }}/.ci/homeboy-agent-task.controller-resume.json
      HOMEBOY_CONTROLLER_EVENT_RESULT_PATH: ${{ github.workspace }}/.ci/homeboy-agent-task.controller-event.json
      HOMEBOY_CONTROLLER_SPEC_PATH: .github/homeboy/controllers/static-site-generation-loop.controller.json
      HOMEBOY_ARTIFACT_ROOT: ${{ github.workspace }}/.ci/homeboy-agent-task-artifacts
    steps:
      - name: Check out wp-site-generator
        uses: actions/checkout@v4

      - name: Check out Homeboy
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/homeboy
          ref: ${{ inputs.homeboy_ref }}
          path: .ci/homeboy

      - name: Check out Homeboy Extensions
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/homeboy-extensions
          ref: ${{ inputs.homeboy_extensions_ref }}
          path: .ci/homeboy-extensions

      - name: Build Homeboy
        run: cargo install --path .ci/homeboy --locked

      - name: Install WordPress extension
        run: homeboy extension install .ci/homeboy-extensions/wordpress --id wordpress

      - name: Materialize Homeboy controller run spec
        id: controller-spec
        run: |
          set -euo pipefail
          inputs_path="$(node .github/scripts/build-homeboy-controller-run-inputs.mjs)"
          homeboy agent-task controller materialize "@$HOMEBOY_CONTROLLER_SPEC_PATH" --inputs "@$inputs_path" --policy-result "@$HOMEBOY_POLICY_RESULT_PATH" --output "$HOMEBOY_CONTROLLER_MATERIALIZATION_RESULT_PATH"
          jq '.data.spec // .value.spec // .spec' "$HOMEBOY_CONTROLLER_MATERIALIZATION_RESULT_PATH" > "$HOMEBOY_CONTROLLER_RUN_SPEC_PATH"
          jq empty "$HOMEBOY_CONTROLLER_RUN_SPEC_PATH"
          echo "path=$HOMEBOY_CONTROLLER_RUN_SPEC_PATH" >> "$GITHUB_OUTPUT"

      - name: Initialize Homeboy controller from spec
        id: controller
        run: |
          set -euo pipefail
          homeboy agent-task controller from-spec "@${{ steps.controller-spec.outputs.path }}" --output "$HOMEBOY_CONTROLLER_FROM_SPEC_RESULT_PATH" --artifact-root "$HOMEBOY_ARTIFACT_ROOT"
          loop_id="$(node -e "const fs=require('fs'); const value=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); console.log(value.data?.loop_id || value.value?.loop_id || value.loop_id || value.data?.controller?.loop_id || value.value?.controller?.loop_id || value.controller?.loop_id);" "$HOMEBOY_CONTROLLER_FROM_SPEC_RESULT_PATH")"
          test -n "$loop_id"
          echo "loop_id=$loop_id" >> "$GITHUB_OUTPUT"

      - name: Record manual task controller event
        run: >-
          homeboy agent-task controller events "${{ steps.controller.outputs.loop_id }}"
          --event-type wpsg.manual_task.requested
          --event-key "homeboy-agent-task-${{ github.run_id }}-${{ inputs.task_kind }}"
          --payload '{"task_kind":"${{ inputs.task_kind }}","run_id":"${{ github.run_id }}","repository":"${{ github.repository }}"}'
          --output "$HOMEBOY_CONTROLLER_EVENT_RESULT_PATH"

      - name: Resume Homeboy controller
        run: homeboy agent-task controller resume "${{ steps.controller.outputs.loop_id }}" --output "$HOMEBOY_CONTROLLER_RESUME_RESULT_PATH" --artifact-root "$HOMEBOY_ARTIFACT_ROOT"

      - name: Upload Homeboy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: homeboy-agent-task-${{ inputs.task_kind }}-${{ github.run_id }}
          path: |
            .ci/homeboy-agent-task.controller-run-spec.json
            .ci/homeboy-agent-task.controller-run-inputs.json
            .ci/homeboy-agent-task.complexity-policy-result.json
            .ci/homeboy-agent-task.controller-materialization.json
            .ci/homeboy-agent-task.controller-from-spec.json
            .ci/homeboy-agent-task.controller-resume.json
            .ci/homeboy-agent-task.controller-event.json
            .ci/homeboy-agent-task-artifacts/**
          if-no-files-found: ignore

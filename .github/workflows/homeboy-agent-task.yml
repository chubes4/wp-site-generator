name: Homeboy Agent Task

on:
  workflow_dispatch:
    inputs:
      task_kind:
        description: Agent task to run.
        type: choice
        required: true
        options:
          - store_idea
          - website_idea
          - design
          - static_site
      issue_number:
        description: Issue number for design/static_site tasks.
        required: false
        default: ''
      concept_prompt:
        description: Prompt for store_idea/website_idea tasks.
        required: false
        default: ''
      website_flow_slug:
        description: Website idea flow slug for website_idea tasks.
        type: choice
        options:
          - website-idea-manual-flow
          - website-idea-local-business-flow
          - website-idea-blog-flow
          - website-idea-portfolio-flow
          - website-idea-professional-services-flow
          - website-idea-nonprofit-flow
        default: website-idea-local-business-flow
      openai_model:
        description: OpenAI model to use for imported agent flows.
        required: true
        default: gpt-5.5
      data_machine_ref:
        description: Data Machine ref.
        required: true
        default: main
      data_machine_code_ref:
        description: Data Machine Code ref.
        required: true
        default: main
      homeboy_ref:
        description: Homeboy ref with agent-task DAG support.
        required: true
        default: main
      homeboy_extensions_ref:
        description: Homeboy Extensions ref with Data Machine bundle agent-task support.
        required: true
        default: main
      wp_codebox_ref:
        description: WP Codebox ref.
        required: true
        default: main

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: homeboy-agent-task-${{ github.ref }}-${{ inputs.task_kind }}-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  run-homeboy-agent-task:
    name: Run ${{ inputs.task_kind }} through Homeboy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HOMEBOY_TASK_KIND: ${{ inputs.task_kind }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      CONCEPT_PROMPT: ${{ inputs.concept_prompt }}
      WEBSITE_FLOW_SLUG: ${{ inputs.website_flow_slug }}
      OPENAI_MODEL: ${{ inputs.openai_model }}
      GITHUB_TOKEN: ${{ github.token }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      HOMEBOY_PLAN_PATH: ${{ github.workspace }}/.ci/homeboy-agent-task.plan.json
      HOMEBOY_ARTIFACT_ROOT: ${{ github.workspace }}/.ci/homeboy-agent-task-artifacts
    steps:
      - name: Check out wp-site-generator
        uses: actions/checkout@v4

      - name: Check out Homeboy
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/homeboy
          ref: ${{ inputs.homeboy_ref }}
          path: .ci/homeboy

      - name: Check out Homeboy Extensions
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/homeboy-extensions
          ref: ${{ inputs.homeboy_extensions_ref }}
          path: .ci/homeboy-extensions

      - name: Check out Agents API
        uses: actions/checkout@v4
        with:
          repository: Automattic/agents-api
          ref: main
          path: .ci/agents-api

      - name: Check out Data Machine
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/data-machine
          ref: ${{ inputs.data_machine_ref }}
          path: .ci/data-machine

      - name: Check out Data Machine Code
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/data-machine-code
          ref: ${{ inputs.data_machine_code_ref }}
          path: .ci/data-machine-code

      - name: Check out OpenAI provider
        uses: actions/checkout@v4
        with:
          repository: WordPress/ai-provider-for-openai
          ref: trunk
          path: .ci/ai-provider-for-openai

      - name: Check out WP Codebox
        uses: actions/checkout@v4
        with:
          repository: Automattic/wp-codebox
          ref: ${{ inputs.wp_codebox_ref }}
          path: .ci/wp-codebox

      - name: Build Homeboy
        run: cargo install --path .ci/homeboy --locked

      - name: Install WordPress extension
        run: homeboy extension install .ci/homeboy-extensions/wordpress --id wordpress

      - name: Build WP Codebox CLI
        working-directory: .ci/wp-codebox
        run: |
          npm ci
          npm run build

      - name: Build Homeboy agent-task plan
        id: plan
        run: |
          set -euo pipefail
          plan_path="$(node .github/scripts/build-homeboy-site-generation-plan.mjs)"
          echo "path=$plan_path" >> "$GITHUB_OUTPUT"
          jq empty "$plan_path"

      - name: Run Homeboy agent-task plan
        run: homeboy agent-task run-plan --plan "@${{ steps.plan.outputs.path }}" --record-run-id "homeboy-agent-task-${{ github.run_id }}" --artifact-root "$HOMEBOY_ARTIFACT_ROOT"

      - name: Upload Homeboy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: homeboy-agent-task-${{ inputs.task_kind }}-${{ github.run_id }}
          path: |
            .ci/homeboy-agent-task.plan.json
            .ci/homeboy-agent-task-artifacts/**
            ~/.local/share/homeboy/agent-task-runs/homeboy-agent-task-${{ github.run_id }}/**
          if-no-files-found: ignore

name: Static site validation iterator

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: Repository that owns the generated-site PR.
        required: true
        default: chubes4/wp-site-generator
      source_pr:
        description: Generated-site PR number to report back to.
        required: true
      source_head_sha:
        description: Generated-site PR head SHA validated by the source run.
        required: false
        default: ''
      validation_run_id:
        description: GitHub Actions run ID containing finding packet artifacts.
        required: true
      artifact_name:
        description: Artifact name containing finding-packets.json.
        required: true
      visual_artifact_name:
        description: Artifact name containing visual parity screenshots and visual-diff.json.
        required: true
      model:
        description: Agent model to use for the imported agent flow.
        required: true
        default: gpt-5.5
      runtime_task_ability:
        description: Runtime package task ability supplied by the upstream runtime contract.
        required: true

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  runtime-execution:
    name: Render runtime execution
    runs-on: ubuntu-latest
    outputs:
      runtime_execution: ${{ steps.render.outputs.runtime_execution }}
    steps:
      - uses: actions/checkout@v4
      - id: render
        env:
          RUNTIME_EXECUTION_INPUT: >-
            {"target_repo":"${{ inputs.source_repo }}","prompt":"Run the static-site validation iterator now. The fetch step supplies one Homeboy fanout task request per WPSG grouped finding. Process the embedded finding group as the source of truth.","app_token_repos":"chubes4/wp-site-generator,chubes4/static-site-importer,Automattic/blocks-engine","success_requires_pr":false,"success_completion_outcomes":["pull_request_path","issue_path"],"loop_policy":{"max_turns":24,"step_budget":20,"time_budget_ms":600000},"runtime_output_projections":{"upstream_action_url":"outputs.upstream_action_url","source_callback_url":"outputs.source_callback_url"},"evidence_projections":[{"operation":"create_github_issue","outputs":{"upstream_action_url":"data.issue_url"}},{"operation":"create_github_pull_request","outputs":{"upstream_action_url":"data.html_url"}},{"operation":"comment_github_pull_request","outputs":{"source_callback_url":"data.html_url"}}],"actions_artifact_downloads":[{"repo":"${{ inputs.source_repo }}","run_id":"${{ inputs.validation_run_id }}","name":"${{ inputs.artifact_name }}","dir":".ci/finding-packets"},{"repo":"${{ inputs.source_repo }}","run_id":"${{ inputs.validation_run_id }}","name":"${{ inputs.visual_artifact_name }}","dir":".ci/visual-parity"}],"execute_workflow_builder_command":"FINDING_GROUPS_PATH=.ci/finding-packets/grouped-finding-packets.json node .github/scripts/group-ssi-finding-packets.mjs .ci/finding-packets/finding-packets.json && FANOUT_CONFIG_PATH=.ci/finding-packets/php-transformer-iterator-fanout-config.json node .github/scripts/build-php-transformer-iterator-fanout-config.mjs .ci/finding-packets/grouped-finding-packets.json && homeboy agent-task fanout plan --input @.ci/finding-packets/php-transformer-iterator-fanout-config.json > .ci/finding-packets/php-transformer-iterator-fanout-plan.json && homeboy agent-task fanout submit-batch --input @.ci/finding-packets/php-transformer-iterator-fanout-config.json --batch-id wpsg-php-transformer-iterator-${{ github.run_id }} > .ci/finding-packets/php-transformer-iterator-fanout-submit.json && node -e \\\"const fs=require('fs'); const value=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); console.log(value.batch?.batch_id || value.data?.batch?.batch_id || value.value?.batch?.batch_id);\\\" .ci/finding-packets/php-transformer-iterator-fanout-submit.json > .ci/finding-packets/php-transformer-iterator-fanout-batch-id.txt && batch_id=$(cat .ci/finding-packets/php-transformer-iterator-fanout-batch-id.txt) && homeboy agent-task fanout status $batch_id > .ci/finding-packets/php-transformer-iterator-fanout-status.json && homeboy agent-task fanout artifacts $batch_id > .ci/finding-packets/php-transformer-iterator-fanout-artifacts.json && node bundles/php-transformer-iterator-agent/scripts/build-agent-iterator-workflow.mjs .ci/finding-packets/php-transformer-iterator-fanout-plan.json .ci/agent-iterator-workflow.json","execute_workflow_path":".ci/agent-iterator-workflow.json","transcript_artifact_name":"php-transformer-iterator-transcript-${{ github.run_id }}"}
          RUNTIME_EXECUTION_OPTIONS: '{"pipeline_slug":"php-transformer-iterator-pipeline"}'
          HOMEBOY_AGENT_RUNTIME_TASK_ABILITY: ${{ inputs.runtime_task_ability }}
        run: >-
          node .github/scripts/render-runtime-bundle-execution.mjs
          --package-source bundles/php-transformer-iterator-agent
          --package-slug php-transformer-iterator-agent
          --workflow-id php-transformer-iterator-manual-flow

  iterator:
    name: Run PR-first validation iterator
    needs: runtime-execution
    uses: ./.github/workflows/wpsg-runtime-agent-ci.yml
    with:
      model: ${{ inputs.model }}
      runtime_workload_profile: workspace-iteration
      runtime_execution: ${{ needs.runtime-execution.outputs.runtime_execution }}
      runtime_task_ability: ${{ inputs.runtime_task_ability }}
      transcript_slots: '[{"name":"php-transformer-iterator-transcript","artifact_name":"php-transformer-iterator-transcript-${{ github.run_id }}"}]'
      task_timeout_seconds: 900
    secrets: inherit

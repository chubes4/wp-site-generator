name: PHP transformer iterator

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: Repository that owns the generated-site PR.
        required: true
        default: chubes4/wp-site-generator
      source_pr:
        description: Generated-site PR number to report back to.
        required: true
      source_head_sha:
        description: Generated-site PR head SHA validated by the source run.
        required: false
        default: ''
      validation_run_id:
        description: GitHub Actions run ID containing finding packet artifacts.
        required: true
      artifact_name:
        description: Artifact name containing finding-packets.json.
        required: true
      openai_model:
        description: OpenAI model to use for the imported agent flow.
        required: true
        default: gpt-5.5
      data_machine_ref:
        description: Data Machine ref.
        required: true
        default: main
      data_machine_code_ref:
        description: Data Machine Code ref.
        required: true
        default: main

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  prepare:
    name: Build iterator fan-out items
    runs-on: ubuntu-latest
    outputs:
      fanout_items: ${{ steps.fanout.outputs.fanout_items }}
    steps:
      - name: Checkout site generator
        uses: actions/checkout@v4

      - name: Generate Homeboy app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}
          owner: chubes4
          repositories: wp-site-generator,static-site-importer,html-to-blocks-converter,block-format-bridge

      - name: Download finding packet artifact
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SOURCE_REPO: ${{ inputs.source_repo }}
          VALIDATION_RUN_ID: ${{ inputs.validation_run_id }}
          ARTIFACT_NAME: ${{ inputs.artifact_name }}
        run: |
          set -euo pipefail
          mkdir -p .ci/finding-packets
          gh run download "$VALIDATION_RUN_ID" --repo "$SOURCE_REPO" --name "$ARTIFACT_NAME" --dir .ci/finding-packets

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Group finding packets
        env:
          FINDING_GROUPS_PATH: .ci/php-transformer-iterator-input.json
        run: |
          set -euo pipefail
          mapfile -t packets < <(find .ci/finding-packets -name finding-packets.json -type f | sort)
          if [ "${#packets[@]}" -eq 0 ]; then
            echo "No finding-packets.json files found in artifact ${{ inputs.artifact_name }}" >&2
            exit 1
          fi
          node .github/scripts/group-ssi-finding-packets.mjs "${packets[@]}"
          jq '.group_count, .candidate_repos' "$FINDING_GROUPS_PATH"

      - name: Build fan-out item prompts
        id: fanout
        env:
          FINDING_GROUPS_PATH: .ci/php-transformer-iterator-input.json
          FANOUT_ITEMS_PATH: .ci/php-transformer-iterator-fanout-items.json
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_PR: ${{ inputs.source_pr }}
          SOURCE_HEAD_SHA: ${{ inputs.source_head_sha }}
          VALIDATION_RUN_ID: ${{ inputs.validation_run_id }}
        run: |
          set -euo pipefail
          node .github/scripts/build-php-transformer-fanout-items.mjs
          fanout_items=$(jq -c . "$FANOUT_ITEMS_PATH")
          jq 'map({id, candidate_repo, kind})' "$FANOUT_ITEMS_PATH"
          {
            printf 'fanout_items<<EOF\n'
            printf '%s\n' "$fanout_items"
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"

  iterator:
    name: Run PR-first transformer iterator fan-out
    needs: prepare
    uses: Extra-Chill/homeboy-extensions/.github/workflows/datamachine-agent-fanout-ci.yml@main
    with:
      fanout_items: ${{ needs.prepare.outputs.fanout_items }}
      bundle_path: bundles/php-transformer-iterator-agent
      agent_slug: php-transformer-iterator-agent
      pipeline_slug: php-transformer-iterator-pipeline
      flow_slug: php-transformer-iterator-manual-flow
      target_repo: ${{ inputs.source_repo }}
      model: ${{ inputs.openai_model }}
      app_token_repos: chubes4/wp-site-generator,chubes4/static-site-importer,chubes4/html-to-blocks-converter,chubes4/block-format-bridge
      data_machine_ref: ${{ inputs.data_machine_ref }}
      data_machine_code_ref: ${{ inputs.data_machine_code_ref }}
      success_requires_pr: true
      max_turns: 24
      step_budget: 20
      time_budget_ms: 600000
      engine_data_outputs: '{"upstream_action_url":"metadata.engine_data.php_transformer_iterator.upstream_action_url","source_callback_url":"metadata.engine_data.php_transformer_iterator.source_callback_url"}'
      transcript_artifact_prefix: php-transformer-iterator-transcript-${{ github.run_id }}
    secrets:
      HOMEBOY_APP_ID: ${{ secrets.HOMEBOY_APP_ID }}
      HOMEBOY_APP_PRIVATE_KEY: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

name: Static site validation iterator

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: Repository that owns the generated-site PR.
        required: true
        default: chubes4/wp-site-generator
      source_pr:
        description: Generated-site PR number to report back to.
        required: true
      source_head_sha:
        description: Generated-site PR head SHA validated by the source run.
        required: false
        default: ''
      validation_run_id:
        description: GitHub Actions run ID containing finding packet artifacts.
        required: true
      artifact_name:
        description: Artifact name containing finding-packets.json.
        required: true
      visual_artifact_name:
        description: Artifact name containing visual parity screenshots and visual-diff.json.
        required: true
      openai_model:
        description: OpenAI model to use for the imported agent flow.
        required: true
        default: gpt-5.5

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  iterator:
    name: Run PR-first validation iterator
    uses: Extra-Chill/homeboy-extensions/.github/workflows/runtime-agent-ci.yml@main
    with:
      runtime_provider: codebox
      model: ${{ inputs.openai_model }}
      runtime_profile: wpsg-codebox-agent-bundle
      runtime_profiles: '{"wpsg-codebox-agent-bundle":{"id":"wpsg-codebox-agent-bundle","runtime_task_ability":"datamachine/run-agent-bundle"}}'
      runtime_task: '{"ability":"datamachine/run-agent-bundle","input":{"bundle_path":"bundles/php-transformer-iterator-agent","agent_slug":"php-transformer-iterator-agent","pipeline_slug":"php-transformer-iterator-pipeline","flow_slug":"php-transformer-iterator-manual-flow","target_repo":"${{ inputs.source_repo }}","prompt":"Run the static-site validation iterator now. The fetch step supplies exactly one grouped finding per runtime child job. Process the fetched DataPacket as the source of truth.","app_token_repos":"chubes4/wp-site-generator,chubes4/static-site-importer,chubes4/html-to-blocks-converter,chubes4/block-format-bridge,chubes4/block-artifact-compiler","success_requires_pr":false,"success_completion_outcomes":["pull_request_path","issue_path"],"max_turns":24,"step_budget":20,"time_budget_ms":600000,"engine_data_outputs":{"upstream_action_url":"metadata.engine_data.php_transformer_iterator.upstream_action_url","source_callback_url":"metadata.engine_data.php_transformer_iterator.source_callback_url"},"tool_recorders":[{"tool":"create_github_issue","record":{"engine_key":"php_transformer_iterator","fields":{"upstream_action_url":"data.issue_url"}}},{"tool":"create_github_pull_request","record":{"engine_key":"php_transformer_iterator","fields":{"upstream_action_url":"data.html_url"}}}],"actions_artifact_downloads":[{"repo":"${{ inputs.source_repo }}","run_id":"${{ inputs.validation_run_id }}","name":"${{ inputs.artifact_name }}","dir":".ci/finding-packets"},{"repo":"${{ inputs.source_repo }}","run_id":"${{ inputs.validation_run_id }}","name":"${{ inputs.visual_artifact_name }}","dir":".ci/visual-parity"}],"execute_workflow_builder_command":"FINDING_GROUPS_PATH=.ci/finding-packets/grouped-finding-packets.json node .github/scripts/group-ssi-finding-packets.mjs .ci/finding-packets/finding-packets.json && VISUAL_ARTIFACT_DIR=.ci/visual-parity node .github/scripts/build-datamachine-iterator-workflow.mjs .ci/finding-packets/grouped-finding-packets.json .ci/datamachine-iterator-workflow.json","execute_workflow_path":".ci/datamachine-iterator-workflow.json","transcript_artifact_name":"php-transformer-iterator-transcript-${{ github.run_id }}"}}'
      ability_requirements: '["datamachine-code/create-github-issue","wp-codebox/runner-workspace-command","wp-codebox/runner-workspace-publish","datamachine-code/upsert-github-pull-review-comment"]'
      ability_tools: '[{"name":"workspace_clone","ability":"wp-codebox/runner-workspace-command"},{"name":"workspace_worktree_add","ability":"wp-codebox/runner-workspace-command"},{"name":"workspace_read","ability":"wp-codebox/runner-workspace-command"},{"name":"workspace_write","ability":"wp-codebox/runner-workspace-command"},{"name":"workspace_edit","ability":"wp-codebox/runner-workspace-command"},{"name":"workspace_git_status","ability":"wp-codebox/runner-workspace-command"},{"name":"workspace_git_commit","ability":"wp-codebox/runner-workspace-command"},{"name":"workspace_git_push","ability":"wp-codebox/runner-workspace-command"},{"name":"create_github_pull_request","ability":"wp-codebox/runner-workspace-publish"},{"name":"create_github_issue","ability":"datamachine-code/create-github-issue"}]'
      transcript_slots: '[{"name":"php-transformer-iterator-transcript","artifact_name":"php-transformer-iterator-transcript-${{ github.run_id }}"}]'
      task_timeout_seconds: 900

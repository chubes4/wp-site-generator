name: Static Site Agent

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: status:idea-ready issue number to implement.
        required: true
      openai_model:
        description: OpenAI model to use for the imported agent flow.
        required: true
        default: gpt-5.5
      data_machine_ref:
        description: Data Machine ref.
        required: true
        default: main
      data_machine_code_ref:
        description: Data Machine Code ref.
        required: true
        default: main
      homeboy_extensions_ref:
        description: Homeboy Extensions ref.
        required: true
        default: main

permissions:
  contents: read
  pull-requests: read
  issues: read

env:
  HOMEBOY_APP_ID: ${{ secrets.HOMEBOY_APP_ID }}
  HOMEBOY_APP_PRIVATE_KEY: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}

jobs:
  static-site-agent:
    name: Run static-site-agent in Playground
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout site generator
        uses: actions/checkout@v4

      - name: Validate issue_number input
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          if ! [[ "$ISSUE_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "issue_number must be a positive integer (got: '$ISSUE_NUMBER')." >&2
            exit 1
          fi

      - name: Require cross-repo app credentials
        run: |
          set -euo pipefail
          if [ -z "${HOMEBOY_APP_ID:-}" ] || [ -z "${HOMEBOY_APP_PRIVATE_KEY:-}" ]; then
            echo "HOMEBOY_APP_ID and HOMEBOY_APP_PRIVATE_KEY are required for static-site PR writes." >&2
            exit 1
          fi

      - name: Generate cross-repo app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.HOMEBOY_APP_ID }}
          private-key: ${{ env.HOMEBOY_APP_PRIVATE_KEY }}
          owner: chubes4
          repositories: wp-site-generator

      - name: Checkout Homeboy Extensions
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/homeboy-extensions
          ref: ${{ inputs.homeboy_extensions_ref }}
          path: .ci/homeboy-extensions

      - name: Checkout Data Machine
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/data-machine
          ref: ${{ inputs.data_machine_ref }}
          path: .ci/data-machine

      - name: Checkout Data Machine Code
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/data-machine-code
          ref: ${{ inputs.data_machine_code_ref }}
          path: .ci/data-machine-code

      - name: Checkout Agents API
        uses: actions/checkout@v4
        with:
          repository: Automattic/agents-api
          path: .ci/agents-api

      - name: Checkout OpenAI provider
        uses: actions/checkout@v4
        with:
          repository: WordPress/ai-provider-for-openai
          path: .ci/ai-provider-for-openai

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Homeboy WordPress extension dependencies
        working-directory: .ci/homeboy-extensions/wordpress
        run: |
          composer install --no-interaction --no-progress --prefer-dist
          npm install

      - name: Install plugin PHP dependencies
        run: |
          composer install --working-dir=.ci/data-machine --no-interaction --no-progress --prefer-dist
          composer install --working-dir=.ci/data-machine-code --no-interaction --no-progress --prefer-dist

      - name: Run static-site-agent in Playground
        id: static-site-agent
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HOMEBOY_EXTENSION_PATH: ${{ github.workspace }}/.ci/homeboy-extensions/wordpress
          AGENTS_API_PATH: ${{ github.workspace }}/.ci/agents-api
          DM_PATH: ${{ github.workspace }}/.ci/data-machine
          DMC_PATH: ${{ github.workspace }}/.ci/data-machine-code
          OPENAI_PROVIDER_PATH: ${{ github.workspace }}/.ci/ai-provider-for-openai
          STATIC_SITE_AGENT_OPENAI_MODEL: ${{ inputs.openai_model }}
          STATIC_SITE_AGENT_TARGET_REPO: ${{ github.repository }}
          STATIC_SITE_AGENT_ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: tests/playground-ci/scripts/run-static-site-agent.sh

      - name: Upload static-site-agent transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-site-agent-transcript-${{ github.run_id }}
          path: tests/playground-ci/component/artifacts/static-site-agent/
          if-no-files-found: ignore

name: Static Site Agent

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: status:idea-ready issue number to implement.
        required: true
      openai_model:
        description: OpenAI model to use for the imported agent flow.
        required: true
        default: gpt-5.5
      data_machine_ref:
        description: Data Machine ref.
        required: true
        default: main
      data_machine_code_ref:
        description: Data Machine Code ref.
        required: true
        default: main
      homeboy_extensions_ref:
        description: Homeboy Extensions ref.
        required: true
        default: main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  prepare:
    name: Prepare static-site-agent prompt
    runs-on: ubuntu-latest
    outputs:
      prompt: ${{ steps.prompt.outputs.prompt }}
    steps:
      - name: Validate issue_number input
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          if ! [[ "$ISSUE_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "issue_number must be a positive integer (got: '$ISSUE_NUMBER')." >&2
            exit 1
          fi

      - name: Build agent prompt
        id: prompt
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          {
            printf 'prompt<<EOF\n'
            printf 'Implement GitHub issue #%s as a static site. Read the issue body and the design agent comment, honor both, and open exactly one static-site PR for that issue.\n' "$ISSUE_NUMBER"
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"

  static-site-agent:
    name: Run static-site-agent in Playground
    needs: prepare
    uses: Extra-Chill/homeboy-extensions/.github/workflows/datamachine-agent-ci.yml@main
    with:
      bundle_path: bundles/static-site-agent
      agent_slug: static-site-agent
      pipeline_slug: static-site-pipeline
      flow_slug: static-site-manual-flow
      target_repo: chubes4/wp-site-generator
      prompt: ${{ needs.prepare.outputs.prompt }}
      model: ${{ inputs.openai_model }}
      validation_dependencies: Automattic/agents-api@main,Extra-Chill/data-machine@${{ inputs.data_machine_ref }},Extra-Chill/data-machine-code@${{ inputs.data_machine_code_ref }},WordPress/ai-provider-for-openai
      success_requires_pr: true
      engine_data_outputs: '{"static_site_pr_url":"metadata.engine_data.static_site_agent.pr_url","static_site_branch":"metadata.engine_data.static_site_agent.branch","static_site_slug":"metadata.engine_data.static_site_agent.slug"}'
      transcript_artifact_name: static-site-agent-transcript-${{ github.run_id }}
      comment_pr_summary: false
    secrets:
      HOMEBOY_APP_ID: ${{ secrets.HOMEBOY_APP_ID }}
      HOMEBOY_APP_PRIVATE_KEY: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

name: Idea lifecycle labels

on:
  pull_request_target:
    types: [opened, reopened, closed]
  issues:
    types: [reopened]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: idea-lifecycle-labels-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  pr-opened:
    name: Mark idea built when static-site PR opens
    if: |
      github.event_name == 'pull_request_target' &&
      (github.event.action == 'opened' || github.event.action == 'reopened') &&
      github.event.pull_request.state == 'open' &&
      contains(github.event.pull_request.labels.*.name, 'target:static-site')
    runs-on: ubuntu-latest
    steps:
      - name: Require cross-repo app credentials
        env:
          HOMEBOY_APP_ID: ${{ secrets.HOMEBOY_APP_ID }}
          HOMEBOY_APP_PRIVATE_KEY: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBOY_APP_ID:-}" ] || [ -z "${HOMEBOY_APP_PRIVATE_KEY:-}" ]; then
            echo "HOMEBOY_APP_ID and HOMEBOY_APP_PRIVATE_KEY are required." >&2
            exit 1
          fi

      - name: Generate Homeboy app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Apply status:built and clear status:idea-ready
        uses: actions/github-script@v7
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const body = process.env.PR_BODY || '';
            const re = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*:?\s*#(\d+)/gi;
            const ideaIssues = new Set();
            let match;
            while ((match = re.exec(body)) !== null) {
              ideaIssues.add(Number(match[1]));
            }
            if (ideaIssues.size === 0) {
              core.warning('No "Closes #N" reference found in PR body; nothing to label.');
              return;
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            for (const issueNumber of ideaIssues) {
              core.info(`Updating idea issue #${issueNumber}: add status:built, remove status:idea-ready.`);
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: ['status:built'],
                });
              } catch (err) {
                core.warning(`Failed to add status:built to #${issueNumber}: ${err.message}`);
              }
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name: 'status:idea-ready',
                });
              } catch (err) {
                if (err.status === 404) {
                  core.info(`Label status:idea-ready was not present on #${issueNumber}; nothing to remove.`);
                } else {
                  core.warning(`Failed to remove status:idea-ready from #${issueNumber}: ${err.message}`);
                }
              }
            }

  pr-closed-unmerged:
    name: Reset labels when static-site PR closes unmerged
    if: |
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == false &&
      contains(github.event.pull_request.labels.*.name, 'target:static-site')
    runs-on: ubuntu-latest
    steps:
      - name: Require cross-repo app credentials
        env:
          HOMEBOY_APP_ID: ${{ secrets.HOMEBOY_APP_ID }}
          HOMEBOY_APP_PRIVATE_KEY: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBOY_APP_ID:-}" ] || [ -z "${HOMEBOY_APP_PRIVATE_KEY:-}" ]; then
            echo "HOMEBOY_APP_ID and HOMEBOY_APP_PRIVATE_KEY are required." >&2
            exit 1
          fi

      - name: Generate Homeboy app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Roll back status:built and apply status:abandoned when no other claim
        uses: actions/github-script@v7
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const body = process.env.PR_BODY || '';
            const closingPrNumber = Number(process.env.PR_NUMBER);
            const re = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*:?\s*#(\d+)/gi;
            const ideaIssues = new Set();
            let match;
            while ((match = re.exec(body)) !== null) {
              ideaIssues.add(Number(match[1]));
            }
            if (ideaIssues.size === 0) {
              core.warning('No "Closes #N" reference found in PR body; nothing to roll back.');
              return;
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Search for any other open static-site PRs that close the same issue.
            const otherOpenClaims = async (issueNumber) => {
              const q = `repo:${owner}/${repo} is:pr is:open label:"target:static-site" -head:foo`;
              // Use search to enumerate open target:static-site PRs and inspect their bodies.
              const prs = await github.paginate(github.rest.search.issuesAndPullRequests, {
                q: `repo:${owner}/${repo} is:pr is:open label:"target:static-site"`,
                per_page: 100,
              });
              const claimRe = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*:?\s*#(\d+)/gi;
              for (const pr of prs) {
                if (pr.number === closingPrNumber) continue;
                const prBody = pr.body || '';
                let m;
                claimRe.lastIndex = 0;
                while ((m = claimRe.exec(prBody)) !== null) {
                  if (Number(m[1]) === issueNumber) {
                    return true;
                  }
                }
              }
              return false;
            };

            for (const issueNumber of ideaIssues) {
              const stillClaimed = await otherOpenClaims(issueNumber);
              if (stillClaimed) {
                core.info(`Issue #${issueNumber} still claimed by another open target:static-site PR; leaving labels untouched.`);
                continue;
              }
              core.info(`Resetting labels on idea issue #${issueNumber}: remove status:built, add status:abandoned.`);
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name: 'status:built',
                });
              } catch (err) {
                if (err.status === 404) {
                  core.info(`Label status:built was not present on #${issueNumber}; nothing to remove.`);
                } else {
                  core.warning(`Failed to remove status:built from #${issueNumber}: ${err.message}`);
                }
              }
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: ['status:abandoned'],
                });
              } catch (err) {
                core.warning(`Failed to add status:abandoned to #${issueNumber}: ${err.message}`);
              }
            }

  issue-reopened:
    name: Restore status:idea-ready when an idea is reopened
    if: github.event_name == 'issues' && github.event.action == 'reopened'
    runs-on: ubuntu-latest
    steps:
      - name: Require cross-repo app credentials
        env:
          HOMEBOY_APP_ID: ${{ secrets.HOMEBOY_APP_ID }}
          HOMEBOY_APP_PRIVATE_KEY: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBOY_APP_ID:-}" ] || [ -z "${HOMEBOY_APP_PRIVATE_KEY:-}" ]; then
            echo "HOMEBOY_APP_ID and HOMEBOY_APP_PRIVATE_KEY are required." >&2
            exit 1
          fi

      - name: Generate Homeboy app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Restore status:idea-ready and clear lifecycle labels
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_LABELS: ${{ toJSON(github.event.issue.labels.*.name) }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const labelNames = JSON.parse(process.env.ISSUE_LABELS || '[]');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            for (const stale of ['status:built', 'status:abandoned']) {
              if (!labelNames.includes(stale)) continue;
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name: stale,
                });
                core.info(`Removed ${stale} from #${issueNumber}.`);
              } catch (err) {
                if (err.status === 404) {
                  core.info(`Label ${stale} was not present on #${issueNumber}; nothing to remove.`);
                } else {
                  core.warning(`Failed to remove ${stale} from #${issueNumber}: ${err.message}`);
                }
              }
            }

            if (!labelNames.includes('status:idea-ready')) {
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: ['status:idea-ready'],
                });
                core.info(`Added status:idea-ready to #${issueNumber}.`);
              } catch (err) {
                core.warning(`Failed to add status:idea-ready to #${issueNumber}: ${err.message}`);
              }
            }

name: Website Idea Agent

on:
  workflow_dispatch:
    inputs:
      flow_slug:
        description: Which website-idea flow to run.
        type: choice
        options:
          - website-idea-manual-flow
          - website-idea-local-business-flow
          - website-idea-blog-flow
          - website-idea-portfolio-flow
          - website-idea-professional-services-flow
          - website-idea-nonprofit-flow
        default: website-idea-local-business-flow
      concept_prompt:
        description: Override the bundled industry prompt (optional).
        required: false
        default: ""
      openai_model:
        description: OpenAI model to use for the imported agent flow.
        required: true
        default: gpt-5.5
      target_repo:
        description: Repository to publish the concept issue into. Defaults to chubes4/wp-site-generator.
        required: false
        default: chubes4/wp-site-generator
      data_machine_ref:
        description: Data Machine ref.
        required: true
        default: main
      data_machine_code_ref:
        description: Data Machine Code ref.
        required: true
        default: main
      homeboy_extensions_ref:
        description: Homeboy Extensions ref.
        required: true
        default: main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  website-idea-agent:
    name: Run website-idea-agent in Playground
    uses: Extra-Chill/homeboy-extensions/.github/workflows/datamachine-agent-ci.yml@main
    with:
      bundle_path: bundles/website-idea-agent
      agent_slug: website-idea-agent
      pipeline_slug: website-idea-pipeline
      flow_slug: ${{ inputs.flow_slug }}
      target_repo: ${{ inputs.target_repo }}
      prompt: ${{ inputs.concept_prompt }}
      model: ${{ inputs.openai_model }}
      validation_dependencies: Automattic/agents-api@main,Extra-Chill/data-machine@${{ inputs.data_machine_ref }},Extra-Chill/data-machine-code@${{ inputs.data_machine_code_ref }},WordPress/ai-provider-for-openai@main
      success_requires_pr: false
      transcript_artifact_name: website-idea-agent-transcript-${{ github.run_id }}
      comment_pr_summary: false
    secrets: inherit

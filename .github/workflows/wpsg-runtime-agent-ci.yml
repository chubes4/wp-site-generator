name: WPSG runtime agent CI

on:
  workflow_call:
    inputs:
      model:
        description: Model to use for the imported agent flow.
        required: true
        type: string
      runtime_execution:
        description: Generic runtime execution descriptor.
        required: true
        type: string
      runtime_workload_profile:
        description: Runtime workload profile for tool exposure.
        required: false
        default: workspace-iteration
        type: string
      runtime_provider:
        description: Homeboy runtime provider id. Leave empty to use Homeboy/runtime policy.
        required: false
        default: ''
        type: string
      runtime_profile:
        description: Generic WPSG runtime package profile.
        required: false
        default: wpsg-agent-runtime-package
        type: string
      runtime_profiles:
        description: Runtime package profiles JSON. Leave empty to render a generic WPSG package profile.
        required: false
        default: ''
        type: string
      runtime_task_ability:
        description: Runtime package task ability supplied by the upstream runtime contract.
        required: true
        type: string
      runtime_backend:
        description: Optional Homeboy runtime backend selector recorded in the rendered profile.
        required: false
        default: ''
        type: string
      runtime_provider_id:
        description: Optional provider id recorded in the rendered profile.
        required: false
        default: ''
        type: string
      runtime_selector:
        description: Optional runtime selector recorded in the rendered profile.
        required: false
        default: ''
        type: string
      transcript_slots:
        description: Transcript artifact slots for the runtime workflow.
        required: false
        default: '[]'
        type: string
      task_timeout_seconds:
        description: Runtime task timeout in seconds.
        required: false
        default: 900
        type: number

jobs:
  runtime-contracts:
    runs-on: ubuntu-latest
    outputs:
      runtime_provider: ${{ steps.contract.outputs.runtime_provider }}
      runtime_profile: ${{ steps.contract.outputs.runtime_profile }}
      runtime_profiles: ${{ steps.contract.outputs.runtime_profiles }}
      ability_requirements: ${{ steps.contract.outputs.ability_requirements }}
      ability_tools: ${{ steps.contract.outputs.ability_tools }}
    steps:
      - uses: actions/checkout@v4
      - id: contract
        env:
          RUNTIME_WORKLOAD_PROFILE: ${{ inputs.runtime_workload_profile }}
          HOMEBOY_AGENT_RUNTIME_PROVIDER: ${{ inputs.runtime_provider }}
          HOMEBOY_AGENT_RUNTIME_PROFILE: ${{ inputs.runtime_profile }}
          HOMEBOY_AGENT_RUNTIME_PROFILES: ${{ inputs.runtime_profiles }}
          HOMEBOY_AGENT_RUNTIME_TASK_ABILITY: ${{ inputs.runtime_task_ability }}
          HOMEBOY_AGENT_RUNTIME_BACKEND: ${{ inputs.runtime_backend }}
          HOMEBOY_AGENT_RUNTIME_PROVIDER_ID: ${{ inputs.runtime_provider_id }}
          HOMEBOY_AGENT_RUNTIME_SELECTOR: ${{ inputs.runtime_selector }}
        run: node .github/scripts/render-homeboy-runtime-workflow-inputs.mjs

  workspace-iteration:
    needs: runtime-contracts
    if: inputs.runtime_workload_profile == 'workspace-iteration'
    uses: Extra-Chill/homeboy-extensions/.github/workflows/runtime-agent-ci.yml@dc02521a3505e100b9a9c91ce3944c0891c090f3
    with:
      runtime_provider: ${{ inputs.runtime_provider || needs.runtime-contracts.outputs.runtime_provider }}
      model: ${{ inputs.model }}
      runtime_profile: ${{ inputs.runtime_profile || needs.runtime-contracts.outputs.runtime_profile }}
      runtime_profiles: ${{ inputs.runtime_profiles || needs.runtime-contracts.outputs.runtime_profiles }}
      runtime_execution: ${{ inputs.runtime_execution }}
      ability_requirements: ${{ needs.runtime-contracts.outputs.ability_requirements }}
      ability_tools: ${{ needs.runtime-contracts.outputs.ability_tools }}
      transcript_slots: ${{ inputs.transcript_slots }}
      task_timeout_seconds: ${{ inputs.task_timeout_seconds }}
    secrets: inherit

  workspace-publication:
    needs: runtime-contracts
    if: inputs.runtime_workload_profile == 'workspace-publication'
    uses: Extra-Chill/homeboy-extensions/.github/workflows/runtime-agent-ci.yml@dc02521a3505e100b9a9c91ce3944c0891c090f3
    with:
      runtime_provider: ${{ inputs.runtime_provider || needs.runtime-contracts.outputs.runtime_provider }}
      model: ${{ inputs.model }}
      runtime_profile: ${{ inputs.runtime_profile || needs.runtime-contracts.outputs.runtime_profile }}
      runtime_profiles: ${{ inputs.runtime_profiles || needs.runtime-contracts.outputs.runtime_profiles }}
      runtime_execution: ${{ inputs.runtime_execution }}
      ability_requirements: ${{ needs.runtime-contracts.outputs.ability_requirements }}
      transcript_slots: ${{ inputs.transcript_slots }}
      task_timeout_seconds: ${{ inputs.task_timeout_seconds }}
    secrets: inherit

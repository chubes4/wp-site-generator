name: Static site validation

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [main]
    paths:
      - 'static-sites/**'
      - 'homeboy.json'
      - '.github/scripts/static-visual-parity.mjs'
      - '.github/workflows/static-site-validation.yml'

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: static-site-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect-changed-sites:
    name: Detect changed static sites
    if: contains(github.event.pull_request.labels.*.name, 'target:static-site')
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.detect.outputs.sites }}
      has_sites: ${{ steps.detect.outputs.has_sites }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed sites
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          mapfile -t sites < <(git diff --name-only "$base" "$head" -- 'static-sites/**' \
            | awk -F/ 'NF >= 2 { print $2 }' | sort -u)
          if [ "${#sites[@]}" -eq 0 ]; then
            echo "has_sites=false" >> "$GITHUB_OUTPUT"
            echo "sites=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          json=$(printf '%s\n' "${sites[@]}" | jq -R . | jq -cs .)
          echo "has_sites=true" >> "$GITHUB_OUTPUT"
          echo "sites=$json" >> "$GITHUB_OUTPUT"

  validate-site:
    name: Validate ${{ matrix.site }}
    needs: detect-changed-sites
    if: needs.detect-changed-sites.outputs.has_sites == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJSON(needs.detect-changed-sites.outputs.sites) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Homeboy app token
        id: app-token
        if: env.HOMEBOY_APP_ID != '' && env.HOMEBOY_APP_PRIVATE_KEY != ''
        uses: actions/create-github-app-token@v1
        env:
          HOMEBOY_APP_ID: ${{ secrets.HOMEBOY_APP_ID }}
          HOMEBOY_APP_PRIVATE_KEY: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}

      - name: Synthesize Homeboy settings for site
        id: settings
        shell: bash
        env:
          SITE: ${{ matrix.site }}
        run: |
          set -euo pipefail
          workloads=$(jq -nc --arg site "$SITE" '
            [
              {
                "id": "ssi-import",
                "label": ("Static Site Importer: " + $site),
                "run": [
                  {
                    "type": "wp-cli",
                    "command": "wp plugin install woocommerce --activate"
                  },
                  {
                    "type": "wp-cli",
                    "command": ("wp static-site-importer import-theme /wordpress/wp-content/plugins/wc-site-generator/static-sites/" + $site + "/index.html --slug=" + $site + " --activate --overwrite --keep-source --format=json"),
                    "parse": "json"
                  },
                  {
                    "type": "php",
                    "file": ".github/homeboy/ssi-import-diagnostics.php"
                  }
                ],
                "artifacts": {
                  "import_report": {
                    "path": ("wp-content/themes/" + $site + "/import-report.json"),
                    "kind": "json",
                    "label": "Static Site Importer report"
                  }
                }
              }
            ]
          ')
          settings=$(jq -nc --argjson workloads "$workloads" '
            {
              "playground_blueprint": {
                "$schema": "https://playground.wordpress.net/blueprint-schema.json",
                "preferredVersions": { "php": "8.3", "wp": "latest" },
                "steps": [
                  {
                    "step": "installPlugin",
                    "pluginData": {
                      "resource": "git:directory",
                      "url": "https://github.com/chubes4/static-site-importer",
                      "ref": "main",
                      "refType": "branch"
                    },
                    "options": {
                      "activate": true,
                      "targetFolderName": "static-site-importer"
                    }
                  }
                ]
              },
              "playground_workloads": $workloads
            }
          ')
          delim="EOF_$(openssl rand -hex 8)"
          {
            echo "settings<<$delim"
            printf '%s\n' "$settings"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"
          delim="EOF_$(openssl rand -hex 8)"
          {
            echo "workloads<<$delim"
            printf '%s\n' "$workloads"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: Run Homeboy bench (Playground SSI workload)
        id: homeboy
        uses: Extra-Chill/homeboy-action@v2
        with:
          commands: bench
          extension-source: https://github.com/Extra-Chill/homeboy-extensions
          component: wc-site-generator
          autofix: 'false'
          pr-comment: 'false'
          app-token: ${{ steps.app-token.outputs.token }}
          args: >-
            --setting-json playground_workloads='${{ steps.settings.outputs.workloads }}'
        env:
          HOMEBOY_SETTINGS_JSON: ${{ steps.settings.outputs.settings }}
          HOMEBOY_BENCH_ITERATIONS: '1'

      - name: Install visual parity tooling
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save --prefix "$PWD" playwright @wp-playground/cli
          ./node_modules/.bin/playwright install --with-deps chromium

      - name: Capture visual parity screenshots
        id: visual
        if: always()
        shell: bash
        env:
          SITE: ${{ matrix.site }}
        run: |
          set -euo pipefail
          node .github/scripts/static-visual-parity.mjs

      - name: Upload visual parity artifact
        id: upload-visual
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-parity-${{ matrix.site }}
          path: visual-parity-artifacts/${{ matrix.site }}/
          if-no-files-found: ignore

      - name: Read SSI report
        id: report
        if: always()
        shell: bash
        env:
          SITE: ${{ matrix.site }}
        run: |
          set -euo pipefail
          report="homeboy-ci-results/bench.json"
          if [ ! -s "$report" ]; then
            echo "metrics_md=_No bench artifact found._" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ssi=$(jq -r --arg site "$SITE" '
            .data.results.scenarios[]? | select(.id == "ssi-import")
          ' "$report" || echo '{}')
          if [ -z "$ssi" ] || [ "$ssi" = "null" ]; then
            echo "metrics_md=_SSI workload did not run._" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          metrics=$(printf '%s' "$ssi" | jq -r '
            .metrics // {} | to_entries
            | (if length == 0 then "_No SSI metrics emitted yet._" else
                "| Metric | Value |\n| --- | --- |\n" +
                ([ .[] | "| `\(.key)` | \(.value) |" ] | join("\n"))
              end)
          ')
          diagnostics=$(printf '%s' "$ssi" | jq -r --arg site "$SITE" '
            def cell: (. // "") | tostring | gsub("\\n"; " ") | gsub("\\|"; "\\\\|");
            .metadata.import_report_summary as $summary
            | if $summary == null then "" else
                "\n\n### SSI Import Report\n" +
                "- **Report path:** `\($summary.path // "unknown")`\n" +
                "- **Readable:** `\($summary.readable // false)`\n" +
                "- **Top-level keys:** `\((($summary.top_level_keys // []) | join(", ")) // "")`\n" +
                (if (($summary.fallback_diagnostics // []) | length) > 0 then
                  "\n| Site | Selector | Excerpt | Source HTML | Block | Converter | Stage | Reason |\n| --- | --- | --- | --- | --- | --- | --- | --- |\n" +
                  ([ ($summary.fallback_diagnostics // [])[]
                    | "| `\($site)` | \(.selector | cell) | \(.excerpt | cell) | \(.source_html_preview | cell) | `\(.block_name | cell)` | `\(.converter | cell)` | `\(.stage | cell)` | \(.reason | cell) |"
                  ] | join("\n"))
                elif (($summary.findings // []) | length) == 0 then
                  "\n_No classified validation signals found in the import report._"
                else
                  "\n| Kind | Path | Preview |\n| --- | --- | --- |\n" +
                  ([ ($summary.findings // [])[]
                    | "| `\(.kind)` | `\(.path)` | \(.preview | cell) |"
                  ] | join("\n"))
                end)
              end
          ')
          delim="EOF_$(openssl rand -hex 8)"
          {
            echo "metrics_md<<$delim"
            printf '%s\n' "$metrics"
            printf '%s\n' "$diagnostics"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: Build SSI finding packets
        if: always()
        shell: bash
        env:
          SITE: ${{ matrix.site }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_PR: ${{ github.event.pull_request.number }}
          SOURCE_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
          VALIDATION_RUN_ID: ${{ github.run_id }}
          DESIGN_JSON_PATH: static-sites/${{ matrix.site }}/design.json
          DESIGN_DISTRIBUTION_PATH: homeboy-ci-results/design-distribution.json
        run: |
          set -euo pipefail
          node .github/scripts/build-ssi-finding-packets.mjs

      - name: Upload design distribution artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: design-distribution-${{ matrix.site }}
          path: homeboy-ci-results/design-distribution.json
          if-no-files-found: ignore

      - name: Build Playground preview link
        id: preview
        if: always()
        shell: bash
        env:
          SITE: ${{ matrix.site }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          blueprint=$(jq -nc --arg site "$SITE" --arg branch "$BRANCH" '
            {
              "$schema": "https://playground.wordpress.net/blueprint-schema.json",
              "landingPage": "/",
              "preferredVersions": { "php": "8.3", "wp": "latest" },
              "steps": [
                {
                  "step": "installPlugin",
                  "pluginData": {
                    "resource": "git:directory",
                    "url": "https://github.com/chubes4/static-site-importer",
                    "ref": "main",
                    "refType": "branch"
                  },
                  "options": {
                    "activate": true,
                    "targetFolderName": "static-site-importer"
                  }
                },
                {
                  "step": "writeFiles",
                  "writeToPath": "/tmp/static-site",
                  "filesTree": {
                    "resource": "git:directory",
                    "url": "https://github.com/chubes4/wc-site-generator",
                    "ref": $branch,
                    "refType": "branch",
                    "path": ("static-sites/" + $site)
                  }
                },
                {
                  "step": "wp-cli",
                  "command": ("wp static-site-importer import-theme /tmp/static-site/index.html --slug=" + $site + " --activate --overwrite --keep-source --format=json")
                },
                { "step": "login", "username": "admin", "password": "password" }
              ]
            }
          ')
          encoded=$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.stdin.read()))' <<<"$blueprint")
          echo "url=https://playground.wordpress.net/#${encoded}" >> "$GITHUB_OUTPUT"

      - name: Comment validation result on PR
        if: always() && github.event.pull_request != null
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR: ${{ github.event.pull_request.number }}
          SITE: ${{ matrix.site }}
          PREVIEW: ${{ steps.preview.outputs.url }}
          METRICS: ${{ steps.report.outputs.metrics_md }}
          BENCH_STATUS: ${{ steps.homeboy.outcome }}
          VISUAL_STATUS: ${{ steps.visual.outcome }}
          VISUAL_ARTIFACT_URL: ${{ steps.upload-visual.outputs.artifact-url }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Skipping PR comment because Homeboy app token is not configured."
            exit 0
          fi
          body=$(cat <<MARKDOWN
          ## Static site validation: \`$SITE\`

          - **Bench run:** $BENCH_STATUS
          - **Visual parity screenshots:** $VISUAL_STATUS${VISUAL_ARTIFACT_URL:+ ([artifact]($VISUAL_ARTIFACT_URL))}
          - **Playground preview:** [open imported site]($PREVIEW)

          $METRICS

          _Generated by Homeboy WordPress extension running Static Site Importer in WordPress Playground, plus a Playwright screenshot lane comparing source static HTML against the imported WordPress result._
          MARKDOWN
          )
          gh pr comment "$PR" --body "$body"

      - name: Upload bench artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ssi-validation-${{ matrix.site }}
          path: homeboy-ci-results/
          if-no-files-found: ignore

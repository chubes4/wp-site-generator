name: Static site validation

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [main]
    paths:
      - 'static-sites/**'
      - 'homeboy.json'
      - '.github/scripts/static-visual-parity.mjs'
      - '.github/workflows/static-site-validation.yml'
  workflow_dispatch:
    inputs:
      pr_number:
        description: Static-site pull request number to validate.
        required: true

permissions:
  actions: write
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: static-site-validation-${{ github.event.pull_request.number || inputs.pr_number || github.ref }}
  cancel-in-progress: ${{ github.event.action == 'synchronize' }}

jobs:
  validation-preflight:
    name: Validation preflight
    if: |
      github.event.action != 'labeled' ||
      (github.event.action == 'labeled' && github.event.label.name == 'target:wordpress') ||
      (github.event.action == 'labeled' && github.event.label.name == 'target:woocommerce')
    uses: Extra-Chill/homeboy-extensions/.github/workflows/actions-run-once.yml@main
    with:
      mode: check
      idempotency_key: static-site-validation/${{ github.repository }}/${{ github.event.pull_request.number || inputs.pr_number }}/${{ github.event.pull_request.head.sha || github.run_id }}

  detect-changed-sites:
    name: Detect changed static sites
    needs: validation-preflight
    if: needs.validation-preflight.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.detect.outputs.sites }}
      has_sites: ${{ steps.detect.outputs.has_sites }}
      pr_number: ${{ steps.detect.outputs.pr_number }}
      head_sha: ${{ steps.detect.outputs.head_sha }}
      head_ref: ${{ steps.detect.outputs.head_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed sites
        id: detect
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -euo pipefail
          if [ -z "$PR_NUMBER" ]; then
            echo "pull request number is required" >&2
            exit 1
          fi

          pr_json="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid,headRefName)"
          head="$(jq -r '.headRefOid' <<<"$pr_json")"
          head_ref="$(jq -r '.headRefName' <<<"$pr_json")"
          mapfile -t sites < <(gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --name-only \
            | awk -F/ '/^static-sites\// && NF >= 2 { print $2 }' | sort -u)
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head" >> "$GITHUB_OUTPUT"
          echo "head_ref=$head_ref" >> "$GITHUB_OUTPUT"
          if [ "${#sites[@]}" -eq 0 ]; then
            echo "has_sites=false" >> "$GITHUB_OUTPUT"
            echo "sites=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          json=$(printf '%s\n' "${sites[@]}" | jq -R . | jq -cs .)
          echo "has_sites=true" >> "$GITHUB_OUTPUT"
          echo "sites=$json" >> "$GITHUB_OUTPUT"

  validate-site:
    name: Validate ${{ matrix.site }}
    needs: detect-changed-sites
    if: needs.detect-changed-sites.outputs.has_sites == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJSON(needs.detect-changed-sites.outputs.sites) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.detect-changed-sites.outputs.head_sha }}

      - name: Refresh validation harness from main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --depth=1 origin main
          git checkout origin/main -- .github/scripts .github/homeboy
          mkdir -p homeboy-ci-results
          git rev-parse origin/main > homeboy-ci-results/validation-harness-main-sha.txt

      - name: Generate Homeboy app token
        id: app-token
        if: env.HOMEBOY_APP_ID != '' && env.HOMEBOY_APP_PRIVATE_KEY != ''
        uses: actions/create-github-app-token@v1
        env:
          HOMEBOY_APP_ID: ${{ secrets.HOMEBOY_APP_ID }}
          HOMEBOY_APP_PRIVATE_KEY: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}
        with:
          app-id: ${{ secrets.HOMEBOY_APP_ID }}
          private-key: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}
          owner: chubes4
          repositories: wp-site-generator
          permission-issues: write
          permission-pull-requests: write

      - name: Synthesize Homeboy settings for site
        id: settings
        shell: bash
        env:
          SITE: ${{ matrix.site }}
        run: |
          set -euo pipefail
          # WooCommerce is environment setup, not part of the SSI import
          # measurement. Install it via the Playground blueprint so the bench
          # workload only runs the actual SSI import + diagnostic dump. This
          # also avoids the homeboy-extensions wp-cli workload step type
          # missing the `plugin` command (`wp-cli/wp-cli` is the only wp-cli
          # package vendored in the bench runtime — extension/core/option
          # commands are not registered, so `wp plugin install ...` from a
          # workload step fails with "'plugin' is not a registered wp
          # command"). Tracked as a follow-up at homeboy-extensions; the
          # blueprint path is independently the right factoring regardless.
          workloads=$(jq -nc --arg site "$SITE" '
            [
              {
                "id": "ssi-import",
                "label": ("Static Site Importer: " + $site),
                "run": [
                  {
                    "type": "wp-cli",
                    "command": ("static-site-importer import-theme /wordpress/wp-content/plugins/wp-site-generator/static-sites/" + $site + "/index.html --slug=" + $site + " --activate --overwrite --keep-source --format=json"),
                    "parse": "json"
                  },
                  {
                    "type": "php",
                    "file": ".github/homeboy/ssi-import-diagnostics.php"
                  }
                ],
                "artifacts": {
                  "import_report": {
                    "path": ("wp-content/themes/" + $site + "/import-report.json"),
                    "kind": "json",
                    "label": "Static Site Importer report"
                  }
                }
              }
            ]
          ')
          settings=$(jq -nc --argjson workloads "$workloads" '
            {
              "wp_codebox_blueprint": {
                "$schema": "https://playground.wordpress.net/blueprint-schema.json",
                "preferredVersions": { "php": "8.3", "wp": "latest" },
                "steps": [
                  {
                    "step": "installPlugin",
                    "pluginData": {
                      "resource": "wordpress.org/plugins",
                      "slug": "woocommerce"
                    },
                    "options": {
                      "activate": true,
                      "targetFolderName": "woocommerce"
                    }
                  },
                  {
                    "step": "installPlugin",
                    "pluginData": {
                      "resource": "git:directory",
                      "url": "https://github.com/chubes4/block-format-bridge",
                      "ref": "main",
                      "refType": "branch"
                    },
                    "options": {
                      "activate": true,
                      "targetFolderName": "block-format-bridge"
                    }
                  },
                  {
                    "step": "installPlugin",
                    "pluginData": {
                      "resource": "git:directory",
                      "url": "https://github.com/chubes4/static-site-importer",
                      "ref": "main",
                      "refType": "branch"
                    },
                    "options": {
                      "activate": true,
                      "targetFolderName": "static-site-importer"
                    }
                  }
                ]
              },
              "wp_codebox_workloads": $workloads
            }
          ')
          delim="EOF_$(openssl rand -hex 8)"
          {
            echo "settings<<$delim"
            printf '%s\n' "$settings"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"
          delim="EOF_$(openssl rand -hex 8)"
          {
            echo "workloads<<$delim"
            printf '%s\n' "$workloads"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: Run Homeboy bench (Playground SSI workload)
        id: homeboy
        uses: Extra-Chill/homeboy-action@v2
        with:
          commands: bench
          extension-source: https://github.com/Extra-Chill/homeboy-extensions
          component: wp-site-generator
          autofix: 'false'
          pr-comment: 'false'
          app-token: ${{ steps.app-token.outputs.token }}
          args: >-
            --setting-json wp_codebox_workloads='${{ steps.settings.outputs.workloads }}'
        env:
          HOMEBOY_SETTINGS_JSON: ${{ steps.settings.outputs.settings }}
          HOMEBOY_BENCH_ITERATIONS: '1'

      - name: Check out WP Codebox
        if: always()
        uses: actions/checkout@v4
        with:
          repository: Automattic/wp-codebox
          ref: main
          path: .ci/wp-codebox

      - name: Build WP Codebox CLI
        if: always()
        working-directory: .ci/wp-codebox
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Install visual parity helper dependency
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/Extra-Chill/homeboy-extensions .homeboy-extensions
          npm install --no-save --prefix "$PWD" ./.homeboy-extensions/wordpress

      - name: Prepare visual parity artifact directory
        if: always()
        shell: bash
        env:
          SITE: ${{ matrix.site }}
        run: |
          set -euo pipefail
          mkdir -p "visual-parity-artifacts/$SITE"
          jq -nc --arg site "$SITE" '{ site: $site, visualDiff: null, artifacts: [] }' > "visual-parity-artifacts/$SITE/summary.json"

      - name: Capture visual parity screenshots
        id: visual
        if: always()
        shell: bash
        env:
          SITE: ${{ matrix.site }}
        run: |
          set -euo pipefail
          node .github/scripts/static-visual-parity.mjs

      - name: Upload visual parity artifact
        id: upload-visual
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-parity-${{ matrix.site }}
          path: visual-parity-artifacts/${{ matrix.site }}/
          if-no-files-found: ignore

      - name: Read SSI report
        id: report
        if: always()
        shell: bash
        env:
          SITE: ${{ matrix.site }}
        run: |
          set -euo pipefail
          report="homeboy-ci-results/bench.json"
          if [ ! -s "$report" ]; then
            echo "metrics_md=_No bench artifact found._" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          metrics=$(SITE="$SITE" BENCH_PATH="$report" node .github/scripts/render-ssi-validation-report.mjs)
          delim="EOF_$(openssl rand -hex 8)"
          {
            echo "metrics_md<<$delim"
            printf '%s\n' "$metrics"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: Build SSI finding packets
        id: finding-packets
        if: always()
        shell: bash
        env:
          SITE: ${{ matrix.site }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_PR: ${{ needs.detect-changed-sites.outputs.pr_number }}
          SOURCE_HEAD_SHA: ${{ needs.detect-changed-sites.outputs.head_sha }}
          SOURCE_BRANCH: ${{ needs.detect-changed-sites.outputs.head_ref }}
          VALIDATION_RUN_ID: ${{ github.run_id }}
          DESIGN_JSON_PATH: static-sites/${{ matrix.site }}/design.json
          DESIGN_DISTRIBUTION_PATH: homeboy-ci-results/design-distribution.json
          BENCH_OUTCOME: ${{ steps.homeboy.outcome }}
          VISUAL_OUTCOME: ${{ steps.visual.outcome }}
        run: |
          set -euo pipefail
          node .github/scripts/build-ssi-finding-packets.mjs
          packet_count=$(jq 'length' homeboy-ci-results/finding-packets.json)
          actionable_count=$(jq '[ .[] | select(.kind != "import_clean" and .kind != "ignored_region") ] | length' homeboy-ci-results/finding-packets.json)
          echo "finding-packets emitted: ${packet_count}"
          echo "actionable finding-packets emitted: ${actionable_count}"
          echo "packet_count=${packet_count}" >> "$GITHUB_OUTPUT"
          echo "actionable_count=${actionable_count}" >> "$GITHUB_OUTPUT"
          jq -r '.[] | "  - kind=\(.kind) candidate_repo=\(.candidate_repo) reason=\(.reason | tostring | .[0:120])"' homeboy-ci-results/finding-packets.json

      - name: Upload design distribution artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: design-distribution-${{ matrix.site }}
          path: homeboy-ci-results/design-distribution.json
          if-no-files-found: ignore

      - name: Build Playground preview link
        id: preview
        if: always()
        shell: bash
        env:
          SITE: ${{ matrix.site }}
          BRANCH: ${{ needs.detect-changed-sites.outputs.head_ref }}
        run: |
          set -euo pipefail
          import_php=$(SITE="$SITE" python3 <<'PY'
          import os

          site = os.environ['SITE']

          def php_string(value):
              return "'" + value.replace('\\', '\\\\').replace("'", "\\'") + "'"

          print(f"""<?php
          require_once '/wordpress/wp-load.php';
          wp_set_current_user( 1 );
          $ability = wp_get_ability( 'static-site-importer/import-theme' );
          if ( ! $ability ) {{
          	throw new RuntimeException( 'Static Site Importer import ability is not registered.' );
          }}
          $ability_result = $ability->execute( array(
          	'html_path' => '/tmp/static-site/index.html',
          	'slug' => {php_string(site)},
          	'activate' => true,
          	'overwrite' => true,
          	'keep_source' => true,
          ) );
          if ( is_wp_error( $ability_result ) ) {{
          	throw new RuntimeException( $ability_result->get_error_message() );
          }}
          if ( empty( $ability_result['success'] ) ) {{
          	$error = isset( $ability_result['error'] ) && is_array( $ability_result['error'] ) ? $ability_result['error'] : array();
          	throw new RuntimeException( isset( $error['message'] ) ? (string) $error['message'] : 'Static site import failed.' );
          }}
          """)
          PY
          )
          blueprint=$(jq -nc --arg site "$SITE" --arg branch "$BRANCH" --arg import_php "$import_php" '
            {
              "$schema": "https://playground.wordpress.net/blueprint-schema.json",
              "landingPage": "/",
              "preferredVersions": { "php": "8.3", "wp": "latest" },
              "steps": [
                {
                  "step": "installPlugin",
                  "pluginData": {
                    "resource": "wordpress.org/plugins",
                    "slug": "woocommerce"
                  },
                  "options": {
                    "activate": true,
                    "targetFolderName": "woocommerce"
                  }
                },
                {
                  "step": "installPlugin",
                  "pluginData": {
                    "resource": "git:directory",
                    "url": "https://github.com/chubes4/block-format-bridge",
                    "ref": "main",
                    "refType": "branch"
                  },
                  "options": {
                    "activate": true,
                    "targetFolderName": "block-format-bridge"
                  }
                },
                {
                  "step": "installPlugin",
                  "pluginData": {
                    "resource": "git:directory",
                    "url": "https://github.com/chubes4/static-site-importer",
                    "ref": "main",
                    "refType": "branch"
                  },
                  "options": {
                    "activate": true,
                    "targetFolderName": "static-site-importer"
                  }
                },
                {
                  "step": "writeFiles",
                  "writeToPath": "/tmp/static-site",
                  "filesTree": {
                    "resource": "git:directory",
                    "url": "https://github.com/chubes4/wp-site-generator",
                    "ref": $branch,
                    "refType": "branch",
                    "path": ("static-sites/" + $site)
                  }
                },
                {
                  "step": "runPHP",
                  "code": $import_php
                },
                { "step": "login", "username": "admin", "password": "password" }
              ]
            }
          ')
          encoded=$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.stdin.read()))' <<<"$blueprint")
          echo "url=https://playground.wordpress.net/#${encoded}" >> "$GITHUB_OUTPUT"

      - name: Comment validation result on PR
        if: always() && needs.detect-changed-sites.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          PR: ${{ needs.detect-changed-sites.outputs.pr_number }}
          SITE: ${{ matrix.site }}
          PREVIEW: ${{ steps.preview.outputs.url }}
          METRICS: ${{ steps.report.outputs.metrics_md }}
          BENCH_STATUS: ${{ steps.homeboy.outcome }}
          VISUAL_STATUS: ${{ steps.visual.outcome }}
          VISUAL_ARTIFACT_URL: ${{ steps.upload-visual.outputs.artifact-url }}
        run: |
          set -euo pipefail
          body=$(cat <<MARKDOWN
          ## Static site validation: \`$SITE\`

          - **Bench run:** $BENCH_STATUS
          - **Visual parity check:** $VISUAL_STATUS${VISUAL_ARTIFACT_URL:+ ([artifact]($VISUAL_ARTIFACT_URL))}
          - **Playground preview:** [open imported site]($PREVIEW)

          $METRICS

          _Generated by Homeboy WordPress extension running Static Site Importer in WordPress Playground, plus a Playwright screenshot diff lane comparing source static HTML against the imported WordPress result._
          MARKDOWN
          )
          gh pr comment "$PR" --body "$body"

      - name: Upload bench artifact
        id: upload-ssi-validation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ssi-validation-${{ matrix.site }}
          path: homeboy-ci-results/
          if-no-files-found: ignore

      - name: Dispatch PHP transformer iterator
        if: always() && needs.detect-changed-sites.outputs.pr_number != '' && steps.finding-packets.outputs.actionable_count != '' && steps.finding-packets.outputs.actionable_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_PR: ${{ needs.detect-changed-sites.outputs.pr_number }}
          SOURCE_HEAD_SHA: ${{ needs.detect-changed-sites.outputs.head_sha }}
          VALIDATION_RUN_ID: ${{ github.run_id }}
          ARTIFACT_NAME: ssi-validation-${{ matrix.site }}
          VISUAL_ARTIFACT_NAME: visual-parity-${{ matrix.site }}
        run: |
          set -euo pipefail
          gh workflow run php-transformer-iterator.yml \
            --repo "$SOURCE_REPO" \
            --ref main \
            -f source_repo="$SOURCE_REPO" \
            -f source_pr="$SOURCE_PR" \
            -f source_head_sha="$SOURCE_HEAD_SHA" \
            -f validation_run_id="$VALIDATION_RUN_ID" \
            -f artifact_name="$ARTIFACT_NAME" \
            -f visual_artifact_name="$VISUAL_ARTIFACT_NAME" \
            -f openai_model="gpt-5.5" \
            -f data_machine_ref="main" \
            -f data_machine_code_ref="main"

  mark-validation-processed:
    name: Mark validation processed
    needs: [validation-preflight, detect-changed-sites, validate-site]
    if: |
      always() &&
      needs.validation-preflight.outputs.should_run == 'true' &&
      needs.detect-changed-sites.outputs.has_sites == 'true'
    uses: Extra-Chill/homeboy-extensions/.github/workflows/actions-run-once.yml@main
    with:
      mode: mark
      idempotency_key: static-site-validation/${{ github.repository }}/${{ needs.detect-changed-sites.outputs.pr_number }}/${{ needs.detect-changed-sites.outputs.head_sha }}

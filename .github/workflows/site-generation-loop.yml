name: Site Generation Loop

on:
  workflow_dispatch:
    inputs:
      openai_model:
        description: OpenAI model to use for imported agent flows.
        required: true
        default: gpt-5.5
      homeboy_ref:
        description: Homeboy ref with agent-task DAG support.
        required: true
        default: main
      homeboy_extensions_ref:
        description: Homeboy Extensions ref with generic runtime package agent-task support.
        required: true
        default: main
      complexity_tier:
        description: Optional WPSG prompt complexity tier override.
        required: false
        default: ''
      randomness_profile:
        description: Optional WPSG randomness profile override.
        required: false
        default: ''
      randomness_seed:
        description: Optional WPSG randomness seed override.
        required: false
        default: ''
      quality_signals_path:
        description: Optional repo-relative JSON file with recent validation quality signals.
        required: false
        default: ''

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: site-generation-loop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-site-generation-loop:
    name: Run Homeboy site generation plan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      OPENAI_MODEL: ${{ inputs.openai_model }}
      GITHUB_TOKEN: ${{ github.token }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      HOMEBOY_CONTROLLER_RUN_INPUTS_PATH: ${{ github.workspace }}/.ci/site-generation-loop.controller-run-inputs.json
      HOMEBOY_POLICY_RESULT_PATH: ${{ github.workspace }}/.ci/site-generation-loop.complexity-policy-result.json
      HOMEBOY_CONTROLLER_RUN_SPEC_PATH: ${{ github.workspace }}/.ci/site-generation-loop.controller-run-spec.json
      HOMEBOY_CONTROLLER_MATERIALIZATION_RESULT_PATH: ${{ github.workspace }}/.ci/site-generation-loop.controller-materialization.json
      HOMEBOY_CONTROLLER_FROM_SPEC_RESULT_PATH: ${{ github.workspace }}/.ci/site-generation-loop.controller-from-spec.json
      HOMEBOY_CONTROLLER_RESUME_RESULT_PATH: ${{ github.workspace }}/.ci/site-generation-loop.controller-resume.json
      HOMEBOY_CONTROLLER_EVENT_RESULT_PATH: ${{ github.workspace }}/.ci/site-generation-loop.controller-event.json
      HOMEBOY_CONTROLLER_SPEC_PATH: .github/homeboy/controllers/static-site-generation-loop.controller.json
      HOMEBOY_ARTIFACT_ROOT: ${{ github.workspace }}/.ci/homeboy-agent-task-artifacts
      WPSG_COMPLEXITY_TIER: ${{ inputs.complexity_tier }}
      WPSG_RANDOMNESS_PROFILE: ${{ inputs.randomness_profile }}
      WPSG_RANDOMNESS_SEED: ${{ inputs.randomness_seed }}
      WPSG_QUALITY_SIGNALS_PATH: ${{ inputs.quality_signals_path }}
    steps:
      - name: Check out wp-site-generator
        uses: actions/checkout@v4

      - name: Check out Homeboy
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/homeboy
          ref: ${{ inputs.homeboy_ref }}
          path: .ci/homeboy

      - name: Check out Homeboy Extensions
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/homeboy-extensions
          ref: ${{ inputs.homeboy_extensions_ref }}
          path: .ci/homeboy-extensions

      - name: Check out Agents API
        uses: actions/checkout@v4
        with:
          repository: Automattic/agents-api
          ref: main
          path: .ci/agents-api

      - name: Check out OpenAI provider
        uses: actions/checkout@v4
        with:
          repository: WordPress/ai-provider-for-openai
          ref: trunk
          path: .ci/ai-provider-for-openai

      - name: Build Homeboy
        run: cargo install --path .ci/homeboy --locked

      - name: Install WordPress extension
        run: homeboy extension install .ci/homeboy-extensions/wordpress --id wordpress

      - name: Materialize Homeboy controller run spec
        id: controller-spec
        run: |
          set -euo pipefail
          inputs_path="$(node .github/scripts/build-homeboy-controller-run-inputs.mjs)"
          homeboy agent-task controller materialize "@$HOMEBOY_CONTROLLER_SPEC_PATH" --inputs "@$inputs_path" --policy-result "@$HOMEBOY_POLICY_RESULT_PATH" --output "$HOMEBOY_CONTROLLER_MATERIALIZATION_RESULT_PATH"
          jq '.data.spec // .value.spec // .spec' "$HOMEBOY_CONTROLLER_MATERIALIZATION_RESULT_PATH" > "$HOMEBOY_CONTROLLER_RUN_SPEC_PATH"
          jq empty "$HOMEBOY_CONTROLLER_RUN_SPEC_PATH"
          echo "path=$HOMEBOY_CONTROLLER_RUN_SPEC_PATH" >> "$GITHUB_OUTPUT"

      - name: Initialize Homeboy controller from spec
        id: controller
        run: |
          set -euo pipefail
          homeboy agent-task controller from-spec "@${{ steps.controller-spec.outputs.path }}" --output "$HOMEBOY_CONTROLLER_FROM_SPEC_RESULT_PATH" --artifact-root "$HOMEBOY_ARTIFACT_ROOT"
          loop_id="$(node -e "const fs=require('fs'); const value=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); console.log(value.data?.loop_id || value.value?.loop_id || value.loop_id || value.data?.controller?.loop_id || value.value?.controller?.loop_id || value.controller?.loop_id);" "$HOMEBOY_CONTROLLER_FROM_SPEC_RESULT_PATH")"
          test -n "$loop_id"
          echo "loop_id=$loop_id" >> "$GITHUB_OUTPUT"

      - name: Resume Homeboy controller
        run: homeboy agent-task controller resume "${{ steps.controller.outputs.loop_id }}" --output "$HOMEBOY_CONTROLLER_RESUME_RESULT_PATH" --artifact-root "$HOMEBOY_ARTIFACT_ROOT"

      - name: Record GitHub Actions controller event
        run: >-
          homeboy agent-task controller events "${{ steps.controller.outputs.loop_id }}"
          --event-type github.workflow.completed
          --event-key "site-generation-loop-${{ github.run_id }}"
          --payload '{"workflow":"site-generation-loop","run_id":"${{ github.run_id }}","repository":"${{ github.repository }}"}'
          --output "$HOMEBOY_CONTROLLER_EVENT_RESULT_PATH"

      - name: Assert semantic proof state
        run: >-
          node .github/scripts/assert-site-generation-loop-proof.mjs
          --controller-result "$HOMEBOY_CONTROLLER_FROM_SPEC_RESULT_PATH"
          --controller-run-spec "$HOMEBOY_CONTROLLER_RUN_SPEC_PATH"

      - name: Upload Homeboy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-generation-loop-homeboy-${{ github.run_id }}
          path: |
            .ci/site-generation-loop.controller-run-spec.json
            .ci/site-generation-loop.controller-run-inputs.json
            .ci/site-generation-loop.complexity-policy-result.json
            .ci/site-generation-loop.controller-materialization.json
            .ci/site-generation-loop.controller-from-spec.json
            .ci/site-generation-loop.controller-resume.json
            .ci/site-generation-loop.controller-event.json
            .github/site-generation-complexity-policy.json
            .github/homeboy/controllers/static-site-generation-loop.controller.json
            .ci/homeboy-agent-task-artifacts/**
          if-no-files-found: ignore

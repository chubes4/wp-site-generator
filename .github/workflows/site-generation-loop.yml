name: Site Generation Loop

on:
  workflow_dispatch:
    inputs:
      openai_model:
        description: OpenAI model to use for imported agent flows.
        required: true
        default: gpt-5.5
      data_machine_ref:
        description: Data Machine ref.
        required: true
        default: main
      data_machine_code_ref:
        description: Data Machine Code ref.
        required: true
        default: main
      homeboy_ref:
        description: Homeboy ref with agent-task DAG support.
        required: true
        default: main
      homeboy_extensions_ref:
        description: Homeboy Extensions ref with Data Machine bundle agent-task support.
        required: true
        default: main
      complexity_tier:
        description: Optional WPSG prompt complexity tier override.
        required: false
        default: ''
      randomness_profile:
        description: Optional WPSG randomness profile override.
        required: false
        default: ''
      randomness_seed:
        description: Optional WPSG randomness seed override.
        required: false
        default: ''
      quality_signals_path:
        description: Optional repo-relative JSON file with recent validation quality signals.
        required: false
        default: ''

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: site-generation-loop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-site-generation-loop:
    name: Run Homeboy site generation plan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      OPENAI_MODEL: ${{ inputs.openai_model }}
      GITHUB_TOKEN: ${{ github.token }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      HOMEBOY_PLAN_PATH: ${{ github.workspace }}/.ci/site-generation-loop.agent-task-plan.json
      HOMEBOY_CONTROLLER_SPEC_PATH: .github/homeboy/controllers/static-site-generation-loop.controller.json
      HOMEBOY_ARTIFACT_ROOT: ${{ github.workspace }}/.ci/homeboy-agent-task-artifacts
      WPSG_COMPLEXITY_TIER: ${{ inputs.complexity_tier }}
      WPSG_RANDOMNESS_PROFILE: ${{ inputs.randomness_profile }}
      WPSG_RANDOMNESS_SEED: ${{ inputs.randomness_seed }}
      WPSG_QUALITY_SIGNALS_PATH: ${{ inputs.quality_signals_path }}
    steps:
      - name: Check out wp-site-generator
        uses: actions/checkout@v4

      - name: Check out Homeboy
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/homeboy
          ref: ${{ inputs.homeboy_ref }}
          path: .ci/homeboy

      - name: Check out Homeboy Extensions
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/homeboy-extensions
          ref: ${{ inputs.homeboy_extensions_ref }}
          path: .ci/homeboy-extensions

      - name: Check out Agents API
        uses: actions/checkout@v4
        with:
          repository: Automattic/agents-api
          ref: main
          path: .ci/agents-api

      - name: Check out Data Machine
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/data-machine
          ref: ${{ inputs.data_machine_ref }}
          path: .ci/data-machine

      - name: Check out Data Machine Code
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/data-machine-code
          ref: ${{ inputs.data_machine_code_ref }}
          path: .ci/data-machine-code

      - name: Check out OpenAI provider
        uses: actions/checkout@v4
        with:
          repository: WordPress/ai-provider-for-openai
          ref: trunk
          path: .ci/ai-provider-for-openai

      - name: Build Homeboy
        run: cargo install --path .ci/homeboy --locked

      - name: Install WordPress extension
        run: homeboy extension install .ci/homeboy-extensions/wordpress --id wordpress

      - name: Build Homeboy agent-task plan from controller contract
        id: plan
        run: |
          set -euo pipefail
          plan_path="$(node .github/scripts/build-homeboy-site-generation-plan.mjs)"
          echo "path=$plan_path" >> "$GITHUB_OUTPUT"
          jq empty "$plan_path"

      - name: Run Homeboy agent-task plan
        run: homeboy agent-task run-plan --plan "@${{ steps.plan.outputs.path }}" --record-run-id "site-generation-loop-${{ github.run_id }}" --artifact-root "$HOMEBOY_ARTIFACT_ROOT"

      - name: Dispatch static validation for generated PRs
        run: >-
          node .github/scripts/dispatch-static-validation.mjs
          --aggregate "$HOME/.local/share/homeboy/agent-task-runs/site-generation-loop-${{ github.run_id }}/aggregate.json"
          --repo "$GITHUB_REPOSITORY"
          --ref main

      - name: Assert semantic proof state
        run: >-
          node .github/scripts/assert-site-generation-loop-proof.mjs
          --aggregate "$HOME/.local/share/homeboy/agent-task-runs/site-generation-loop-${{ github.run_id }}/aggregate.json"
          --repo "$GITHUB_REPOSITORY"

      - name: Upload Homeboy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-generation-loop-homeboy-${{ github.run_id }}
          path: |
            .ci/site-generation-loop.agent-task-plan.json
            .github/site-generation-complexity-policy.json
            .github/homeboy/controllers/static-site-generation-loop.controller.json
            .ci/homeboy-agent-task-artifacts/**
            ~/.local/share/homeboy/agent-task-runs/site-generation-loop-${{ github.run_id }}/**
          if-no-files-found: ignore

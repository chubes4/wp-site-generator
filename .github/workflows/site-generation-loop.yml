name: Site Generation Loop

on:
  workflow_dispatch:
    inputs:
      model:
        description: Model to use for imported agent flows.
        required: true
        default: gpt-5.5
      homeboy_ref:
        description: Homeboy ref with agent-task DAG support.
        required: true
        default: main
      homeboy_extensions_ref:
        description: Homeboy Extensions ref with generic runtime package agent-task support.
        required: true
        default: main
      runtime_task_ability:
        description: Runtime package task ability supplied by the upstream runtime contract.
        required: true
      ref_policy:
        description: Dependency ref policy. Use branch-defaults for staging; production requires immutable dependency refs.
        required: true
        default: branch-defaults
        type: choice
        options:
          - branch-defaults
          - production
      complexity_tier:
        description: Optional WPSG prompt complexity tier override.
        required: false
        default: ''
      randomness_profile:
        description: Optional WPSG randomness profile override.
        required: false
        default: ''
      randomness_seed:
        description: Optional WPSG randomness seed override.
        required: false
        default: ''
      quality_signals_path:
        description: Optional repo-relative JSON file with recent validation quality signals.
        required: false
        default: ''
      source_head_sha:
        description: Immutable source commit for production provenance. Defaults to the dispatched workflow SHA.
        required: false
        default: ''
      source_tag:
        description: Optional immutable source tag for production provenance.
        required: false
        default: ''
      source_artifact_source:
        description: Optional source artifact URI for production provenance.
        required: false
        default: ''

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: site-generation-loop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-site-generation-loop:
    name: Run Homeboy site generation plan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GITHUB_TOKEN: ${{ github.token }}
      HOMEBOY_AGENT_RUNTIME_MODEL: ${{ inputs.model }}
      HOMEBOY_REF: ${{ inputs.homeboy_ref }}
      HOMEBOY_EXTENSIONS_REF: ${{ inputs.homeboy_extensions_ref }}
      WPSG_REF_POLICY: ${{ inputs.ref_policy }}
      HOMEBOY_AGENT_RUNTIME_TASK_ABILITY: ${{ inputs.runtime_task_ability }}
      HOMEBOY_CONTROLLER_RUN_INPUTS_PATH: ${{ github.workspace }}/.ci/site-generation-loop.controller-run-inputs.json
      HOMEBOY_POLICY_RESULT_PATH: ${{ github.workspace }}/.ci/site-generation-loop.complexity-policy-result.json
      HOMEBOY_CONTROLLER_RUN_SPEC_PATH: ${{ github.workspace }}/.ci/site-generation-loop.controller-run-spec.json
      HOMEBOY_CONTROLLER_MATERIALIZATION_RESULT_PATH: ${{ github.workspace }}/.ci/site-generation-loop.controller-materialization.json
      HOMEBOY_CONTROLLER_RUN_FROM_SPEC_RESULT_PATH: ${{ github.workspace }}/.ci/site-generation-loop.controller-run-from-spec.json
      HOMEBOY_CONTROLLER_SPEC_PATH: .github/homeboy/controllers/static-site-generation-loop.controller.json
      HOMEBOY_ARTIFACT_ROOT: ${{ github.workspace }}/.ci/homeboy-agent-task-artifacts
      WPSG_COMPLEXITY_TIER: ${{ inputs.complexity_tier }}
      WPSG_RANDOMNESS_PROFILE: ${{ inputs.randomness_profile }}
      WPSG_RANDOMNESS_SEED: ${{ inputs.randomness_seed }}
      WPSG_QUALITY_SIGNALS_PATH: ${{ inputs.quality_signals_path }}
      SOURCE_HEAD_SHA: ${{ inputs.source_head_sha || github.sha }}
      SOURCE_TAG: ${{ inputs.source_tag }}
      SOURCE_ARTIFACT_SOURCE: ${{ inputs.source_artifact_source }}
    steps:
      - name: Check out wp-site-generator
        uses: actions/checkout@v4

      - name: Validate production ref policy
        run: node .github/scripts/validate-production-ref-policy.mjs

      - name: Check out Homeboy
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/homeboy
          ref: ${{ env.HOMEBOY_REF }}
          path: .ci/homeboy

      - name: Check out Homeboy Extensions
        uses: actions/checkout@v4
        with:
          repository: Extra-Chill/homeboy-extensions
          ref: ${{ env.HOMEBOY_EXTENSIONS_REF }}
          path: .ci/homeboy-extensions

      - name: Build Homeboy
        run: cargo install --path .ci/homeboy --locked

      - name: Install WordPress extension
        run: homeboy extension install .ci/homeboy-extensions/wordpress --id wordpress

      - name: Generate Homeboy controller spec
        run: node .github/scripts/build-homeboy-ssi-loop-controller.mjs

      - name: Run Homeboy controller from spec
        id: controller-spec
        run: |
          set -euo pipefail
          inputs_path="$(node .github/scripts/build-homeboy-controller-run-inputs.mjs)"
          homeboy agent-task controller run-from-spec "@$HOMEBOY_CONTROLLER_SPEC_PATH" --inputs "@$inputs_path" --policy-result "@$HOMEBOY_POLICY_RESULT_PATH" --max-actions 100 --output "$HOMEBOY_CONTROLLER_RUN_FROM_SPEC_RESULT_PATH"
          jq '.materialization // .data.materialization // .value.materialization' "$HOMEBOY_CONTROLLER_RUN_FROM_SPEC_RESULT_PATH" > "$HOMEBOY_CONTROLLER_MATERIALIZATION_RESULT_PATH"
          materialization_proof_path="${HOMEBOY_CONTROLLER_MATERIALIZATION_RESULT_PATH%.json}.proof.json"
          jq '.data // .value // .' "$HOMEBOY_CONTROLLER_MATERIALIZATION_RESULT_PATH" > "$materialization_proof_path"
          homeboy agent-task controller validate-proof "@$materialization_proof_path"
          node .github/scripts/write-materialized-controller-run-spec.mjs "$HOMEBOY_CONTROLLER_MATERIALIZATION_RESULT_PATH" "$HOMEBOY_CONTROLLER_RUN_SPEC_PATH"
          jq empty "$HOMEBOY_CONTROLLER_RUN_SPEC_PATH"
          echo "path=$HOMEBOY_CONTROLLER_RUN_SPEC_PATH" >> "$GITHUB_OUTPUT"

      - name: Assert semantic proof state
        run: >-
          node .github/scripts/assert-site-generation-loop-proof.mjs
          --controller-result "$HOMEBOY_CONTROLLER_RUN_FROM_SPEC_RESULT_PATH"
          --controller-run-spec "$HOMEBOY_CONTROLLER_RUN_SPEC_PATH"
          --artifact-root "$HOMEBOY_ARTIFACT_ROOT"

      - name: Upload Homeboy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-generation-loop-homeboy-${{ github.run_id }}
          path: |
            .ci/site-generation-loop.controller-run-spec.json
            .ci/site-generation-loop.controller-run-inputs.json
            .ci/site-generation-loop.complexity-policy-result.json
            .ci/site-generation-loop.controller-materialization.json
            .ci/site-generation-loop.controller-run-from-spec.json
            .github/site-generation-complexity-policy.json
            .github/homeboy/controllers/static-site-generation-loop.controller.json
            .ci/homeboy-agent-task-artifacts/**
          if-no-files-found: ignore
